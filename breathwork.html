<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pranayama — Box Breathing</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090b0e;
      --surface: #111419;
      --border: #1c2028;
      --text: #d0ccc4;
      --dim: #4e4d4a;
      --inhale: #5ba4d9;
      --hold: #a78bfa;
      --exhale: #5bd9a4;
      --hold2: #d9a45b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header { text-align: center; }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 2px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--inhale), var(--exhale));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    /* Box visual */
    .box-wrap {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .box-svg {
      width: 100%;
      height: 100%;
    }

    .box-side {
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .box-progress {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px currentColor);
      transition: stroke 0.3s ease;
    }

    /* Center content */
    .box-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .phase-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color 0.3s ease;
      min-height: 36px;
    }

    .count-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 4.5rem;
      line-height: 1;
      margin-top: 2px;
      transition: color 0.3s ease;
    }

    .cycle-text {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 10px;
    }

    /* Breathing circle behind count */
    .breath-circle {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      opacity: 0.08;
      transition: all 1s ease-in-out;
      pointer-events: none;
    }

    .breath-circle.inhale { transform: scale(1.8); }
    .breath-circle.hold { transform: scale(1.8); }
    .breath-circle.exhale { transform: scale(0.6); }
    .breath-circle.hold2 { transform: scale(0.6); }

    /* Duration selector */
    .options { text-align: center; }

    .options label {
      display: block;
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .dur-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dur-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .dur-btn:hover { border-color: var(--inhale); color: var(--inhale); }
    .dur-btn.selected { border-color: var(--inhale); color: var(--inhale); background: rgba(91,164,217,0.08); }

    /* Sound toggle */
    .toggle-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.78rem;
      color: var(--dim);
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input { display: none; }

    .toggle-track {
      width: 34px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--dim);
      top: 2px; left: 2px;
      transition: all 0.2s ease;
    }

    .toggle-row input:checked + .toggle-track { background: var(--inhale); }
    .toggle-row input:checked + .toggle-track::after { left: 18px; background: white; }

    /* Main button */
    .start-btn {
      appearance: none;
      border: 1px solid var(--inhale);
      background: transparent;
      color: var(--inhale);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 15px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .start-btn:hover { box-shadow: 0 0 28px rgba(91,164,217,0.15); }
    .start-btn:active { transform: scale(0.97); }

    /* Progress bar for total time */
    .total-bar-wrap {
      width: 100%;
      max-width: 260px;
    }

    .total-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .total-bar-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .total-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: var(--inhale);
      transition: width 0.5s linear, background 0.3s ease;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .hidden { display: none !important; }

    @media (max-width: 400px) {
      .box-wrap { width: 220px; height: 220px; }
      .count-text { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Pranayama</h1>
      <p>Box Breathing — 4 · 4 · 4 · 4</p>
    </div>

    <div class="box-wrap">
      <svg class="box-svg" viewBox="0 0 260 260">
        <!-- Box outline -->
        <line class="box-side" x1="40" y1="40" x2="220" y2="40" />
        <line class="box-side" x1="220" y1="40" x2="220" y2="220" />
        <line class="box-side" x1="220" y1="220" x2="40" y2="220" />
        <line class="box-side" x1="40" y1="220" x2="40" y2="40" />

        <!-- Animated dot path: draws around the box -->
        <!-- We use a polyline for the progress -->
        <polyline class="box-progress" id="boxPath"
          points="40,40 220,40 220,220 40,220 40,40"
          stroke-dasharray="720"
          stroke-dashoffset="720"
          stroke="var(--inhale)" />

        <!-- Moving dot -->
        <circle id="moveDot" cx="40" cy="40" r="6" fill="var(--inhale)" filter="url(#glow)">
        </circle>

        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      </svg>

      <div class="box-center">
        <div class="breath-circle" id="breathCircle"></div>
        <div class="phase-text" id="phaseText">Ready</div>
        <div class="count-text" id="countText">4</div>
        <div class="cycle-text" id="cycleText"></div>
      </div>
    </div>

    <div class="total-bar-wrap hidden" id="totalBarWrap">
      <div class="total-bar-label">
        <span id="elapsed">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="total-bar-track">
        <div class="total-bar" id="totalBar"></div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--inhale)"></div>Inhale</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--hold)"></div>Hold</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--exhale)"></div>Exhale</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--hold2)"></div>Hold</div>
    </div>

    <div class="options" id="options">
      <label>Session Duration</label>
      <div class="dur-row">
        <button class="dur-btn" data-min="2">2 min</button>
        <button class="dur-btn selected" data-min="5">5 min</button>
        <button class="dur-btn" data-min="10">10 min</button>
        <button class="dur-btn" data-min="15">15 min</button>
        <button class="dur-btn" data-min="20">20 min</button>
      </div>
    </div>

    <label class="toggle-row">
      <span>Sound cues</span>
      <input type="checkbox" id="soundToggle" checked>
      <div class="toggle-track"></div>
    </label>

    <button class="start-btn" id="startBtn">Begin</button>
  </div>

  <script>
    // --- Audio ---
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTick() {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx();
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.15);
    }

    function playPhaseChange(freq) {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx();
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.5);
    }

    function playGong() {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx();
      const t = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.35, t);
      master.gain.exponentialRampToValueAtTime(0.001, t + 4);
      master.connect(ctx.destination);
      [130, 195, 260, 390].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.3 / (i + 1), t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
        o.connect(g); g.connect(master);
        o.start(t); o.stop(t + 4);
      });
    }

    // --- DOM ---
    const phaseText = document.getElementById('phaseText');
    const countText = document.getElementById('countText');
    const cycleText = document.getElementById('cycleText');
    const breathCircle = document.getElementById('breathCircle');
    const boxPath = document.getElementById('boxPath');
    const moveDot = document.getElementById('moveDot');
    const startBtn = document.getElementById('startBtn');
    const options = document.getElementById('options');
    const totalBarWrap = document.getElementById('totalBarWrap');
    const totalBar = document.getElementById('totalBar');
    const elapsedEl = document.getElementById('elapsed');
    const totalTimeEl = document.getElementById('totalTime');

    let selectedMinutes = 5;
    let running = false;
    let animFrame = null;

    // Duration buttons
    document.querySelectorAll('.dur-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (running) return;
        document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMinutes = parseInt(btn.dataset.min);
      });
    });

    // --- Box path math ---
    // The box has 4 sides, each 180px. Total perimeter = 720px.
    // Side 0 (inhale):  (40,40) → (220,40)   top
    // Side 1 (hold):    (220,40) → (220,220)  right
    // Side 2 (exhale):  (220,220) → (40,220)  bottom
    // Side 3 (hold):    (40,220) → (40,40)    left

    const sides = [
      { x1: 40, y1: 40, x2: 220, y2: 40 },
      { x1: 220, y1: 40, x2: 220, y2: 220 },
      { x1: 220, y1: 220, x2: 40, y2: 220 },
      { x1: 40, y1: 220, x2: 40, y2: 40 },
    ];

    const phaseColors = ['var(--inhale)', 'var(--hold)', 'var(--exhale)', 'var(--hold2)'];
    const phaseColorHex = ['#5ba4d9', '#a78bfa', '#5bd9a4', '#d9a45b'];
    const phaseNames = ['Inhale', 'Hold', 'Exhale', 'Hold'];
    const phaseFreqs = [396, 528, 432, 480];
    const BEAT = 4; // seconds per phase
    const CYCLE = BEAT * 4; // 16 seconds per full cycle

    function setDotPosition(sideIndex, fraction) {
      const s = sides[sideIndex];
      const x = s.x1 + (s.x2 - s.x1) * fraction;
      const y = s.y1 + (s.y2 - s.y1) * fraction;
      moveDot.setAttribute('cx', x);
      moveDot.setAttribute('cy', y);
    }

    function setBoxProgress(sideIndex, fraction) {
      // Total dasharray is 720. Each side is 180.
      const completedSides = sideIndex * 180;
      const currentSide = fraction * 180;
      const drawn = completedSides + currentSide;
      boxPath.style.strokeDashoffset = 720 - drawn;
    }

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    // --- Main loop ---
    function startSession() {
      running = true;
      startBtn.textContent = 'Stop';
      options.style.opacity = '0.3';
      options.style.pointerEvents = 'none';
      totalBarWrap.classList.remove('hidden');

      const totalSecs = selectedMinutes * 60;
      totalTimeEl.textContent = formatTime(totalSecs);
      const startTime = performance.now();
      let lastCount = -1;
      let lastPhase = -1;

      // Initial gong
      playGong();

      function tick() {
        const now = performance.now();
        const elapsedMs = now - startTime;
        const elapsedSecs = elapsedMs / 1000;

        if (elapsedSecs >= totalSecs) {
          endSession();
          return;
        }

        // Total progress
        const totalFrac = elapsedSecs / totalSecs;
        totalBar.style.width = (totalFrac * 100) + '%';
        elapsedEl.textContent = formatTime(elapsedSecs);

        // Which cycle, which phase, which second in phase
        const cycleTime = elapsedSecs % CYCLE;
        const phaseIndex = Math.floor(cycleTime / BEAT);
        const phaseTime = cycleTime - phaseIndex * BEAT;
        const phaseFrac = phaseTime / BEAT;
        const currentCount = BEAT - Math.floor(phaseTime);
        const cycleNum = Math.floor(elapsedSecs / CYCLE) + 1;

        // Update phase
        const color = phaseColors[phaseIndex];
        const hex = phaseColorHex[phaseIndex];

        phaseText.textContent = phaseNames[phaseIndex];
        phaseText.style.color = hex;
        countText.textContent = currentCount;
        countText.style.color = hex;
        cycleText.textContent = `Cycle ${cycleNum}`;
        moveDot.setAttribute('fill', hex);
        boxPath.setAttribute('stroke', hex);
        totalBar.style.background = hex;

        // Breathing circle
        breathCircle.style.background = hex;
        breathCircle.className = 'breath-circle ' +
          (phaseIndex === 0 ? 'inhale' : phaseIndex === 1 ? 'hold' : phaseIndex === 2 ? 'exhale' : 'hold2');

        // Dot and path
        setDotPosition(phaseIndex, phaseFrac);
        setBoxProgress(phaseIndex, phaseFrac);

        // Sound on phase change
        if (phaseIndex !== lastPhase) {
          playPhaseChange(phaseFreqs[phaseIndex]);
          lastPhase = phaseIndex;
        }

        // Tick sound on each count change
        if (currentCount !== lastCount) {
          if (lastCount !== -1) playTick();
          lastCount = currentCount;
        }

        animFrame = requestAnimationFrame(tick);
      }

      animFrame = requestAnimationFrame(tick);
    }

    function endSession() {
      running = false;
      cancelAnimationFrame(animFrame);

      // Triple gong
      playGong();
      setTimeout(playGong, 1500);
      setTimeout(playGong, 3000);

      phaseText.textContent = 'Complete';
      phaseText.style.color = 'var(--exhale)';
      countText.textContent = '🙏';
      cycleText.textContent = `${selectedMinutes} minutes`;
      totalBar.style.width = '100%';

      startBtn.textContent = 'Begin';
      options.style.opacity = '1';
      options.style.pointerEvents = 'auto';

      // Reset box
      boxPath.style.strokeDashoffset = 720;
      moveDot.setAttribute('cx', 40);
      moveDot.setAttribute('cy', 40);
    }

    function stopSession() {
      running = false;
      cancelAnimationFrame(animFrame);

      phaseText.textContent = 'Ready';
      phaseText.style.color = 'var(--text)';
      countText.textContent = '4';
      countText.style.color = 'var(--text)';
      cycleText.textContent = '';

      startBtn.textContent = 'Begin';
      options.style.opacity = '1';
      options.style.pointerEvents = 'auto';
      totalBarWrap.classList.add('hidden');
      totalBar.style.width = '0%';

      boxPath.style.strokeDashoffset = 720;
      moveDot.setAttribute('cx', 40);
      moveDot.setAttribute('cy', 40);
      moveDot.setAttribute('fill', 'var(--inhale)');
      boxPath.setAttribute('stroke', 'var(--inhale)');
    }

    startBtn.addEventListener('click', () => {
      if (running) stopSession();
      else startSession();
    });
  </script>
</body>
</html>
