<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pranayama</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090b0e;
      --surface: #111419;
      --border: #1c2028;
      --text: #d0ccc4;
      --dim: #4e4d4a;
      --inhale: #5ba4d9;
      --hold: #a78bfa;
      --exhale: #5bd9a4;
      --hold2: #d9a45b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header { text-align: center; }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 2px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--inhale), var(--exhale));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    /* Box visual */
    .box-wrap {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .box-svg {
      width: 100%;
      height: 100%;
    }

    .box-side {
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .box-progress {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px currentColor);
      transition: stroke 0.3s ease;
    }

    /* Center content */
    .box-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .phase-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color 0.3s ease;
      min-height: 36px;
    }

    .count-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 4.5rem;
      line-height: 1;
      margin-top: 2px;
      transition: color 0.3s ease;
    }

    .cycle-text {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 10px;
    }

    /* Breathing circle behind count */
    .breath-circle {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      opacity: 0.08;
      transition: all 1s ease-in-out;
      pointer-events: none;
    }

    .breath-circle.inhale { transform: scale(1.8); }
    .breath-circle.hold { transform: scale(1.8); }
    .breath-circle.exhale { transform: scale(0.6); }
    .breath-circle.hold2 { transform: scale(0.6); }

    /* Duration selector */
    .options { text-align: center; }

    .options label {
      display: block;
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .dur-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dur-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .dur-btn:hover { border-color: var(--inhale); color: var(--inhale); }
    .dur-btn.selected { border-color: var(--inhale); color: var(--inhale); background: rgba(91,164,217,0.08); }

    /* Sound toggle */
    .toggle-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.78rem;
      color: var(--dim);
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input { display: none; }

    .toggle-track {
      width: 34px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--dim);
      top: 2px; left: 2px;
      transition: all 0.2s ease;
    }

    .toggle-row input:checked + .toggle-track { background: var(--inhale); }
    .toggle-row input:checked + .toggle-track::after { left: 18px; background: white; }

    /* Main button */
    .start-btn {
      appearance: none;
      border: 1px solid var(--inhale);
      background: transparent;
      color: var(--inhale);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 15px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .start-btn:hover { box-shadow: 0 0 28px rgba(91,164,217,0.15); }
    .start-btn:active { transform: scale(0.97); }

    /* Progress bar for total time */
    .total-bar-wrap {
      width: 100%;
      max-width: 260px;
    }

    .total-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .total-bar-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .total-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: var(--inhale);
      transition: width 0.5s linear, background 0.3s ease;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .hidden { display: none !important; }

    /* Technique selector */
    .tech-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tech-btn {
      flex: 1;
      appearance: none;
      border: none;
      background: transparent;
      color: var(--dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.79rem;
      font-weight: 500;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tech-btn + .tech-btn { border-left: 1px solid var(--border); }
    .tech-btn.selected { background: rgba(91,164,217,0.1); color: var(--inhale); }
    .tech-btn:hover:not(.selected) { color: var(--text); }
    .tech-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Guide text (Nadi Sodhana nostril instruction) */
    .guide-text {
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      transition: color 0.3s ease;
      min-height: 18px;
    }

    /* Shift center content up in nadi mode so it clears the nostrils */
    .box-wrap.nadi-mode .box-center { padding-bottom: 64px; }

    /* Nostril glow elements — scale around their own center */
    #leftGlow, #rightGlow {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.8s ease-in-out, opacity 0.4s ease;
    }

    /* Flow dot animations */
    @keyframes floatUp {
      0%   { transform: translateY(10px); opacity: 0; }
      25%  { opacity: 0.85; }
      100% { transform: translateY(-14px); opacity: 0; }
    }
    @keyframes floatDown {
      0%   { transform: translateY(-10px); opacity: 0; }
      25%  { opacity: 0.85; }
      100% { transform: translateY(14px); opacity: 0; }
    }

    .dot-flow-up {
      transform-box: fill-box;
      transform-origin: center;
      animation: floatUp 1.4s ease-in infinite;
    }
    .dot-flow-up:nth-child(2) { animation-delay: 0.47s; }
    .dot-flow-up:nth-child(3) { animation-delay: 0.94s; }

    .dot-flow-down {
      transform-box: fill-box;
      transform-origin: center;
      animation: floatDown 1.4s ease-in infinite;
    }
    .dot-flow-down:nth-child(2) { animation-delay: 0.47s; }
    .dot-flow-down:nth-child(3) { animation-delay: 0.94s; }

    @media (max-width: 400px) {
      .box-wrap { width: 220px; height: 220px; }
      .count-text { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Pranayama</h1>
      <p id="subtitle">Box Breathing — 4 · 4 · 4 · 4</p>
    </div>

    <div class="tech-row">
      <button class="tech-btn selected" data-tech="box">Box Breathing</button>
      <button class="tech-btn" data-tech="nadi">Nadi Sodhana</button>
    </div>

    <div class="box-wrap" id="boxWrap">
      <svg class="box-svg" id="boxSvg" viewBox="0 0 260 260">
        <!-- Box outline -->
        <line class="box-side" x1="40" y1="40" x2="220" y2="40" />
        <line class="box-side" x1="220" y1="40" x2="220" y2="220" />
        <line class="box-side" x1="220" y1="220" x2="40" y2="220" />
        <line class="box-side" x1="40" y1="220" x2="40" y2="40" />

        <!-- Animated dot path: draws around the box -->
        <!-- We use a polyline for the progress -->
        <polyline class="box-progress" id="boxPath"
          points="40,40 220,40 220,220 40,220 40,40"
          stroke-dasharray="720"
          stroke-dashoffset="720"
          stroke="var(--inhale)" />

        <!-- Moving dot -->
        <circle id="moveDot" cx="40" cy="40" r="6" fill="var(--inhale)" filter="url(#glow)">
        </circle>

        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      </svg>

      <!-- Nadi Sodhana nostril SVG (hidden by default) -->
      <svg class="box-svg hidden" id="noseSvg" viewBox="0 0 260 260">
        <defs>
          <filter id="nGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="rGlow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Cycle progress ring -->
        <circle cx="130" cy="130" r="122" fill="none" stroke="#1c2028" stroke-width="1.5"/>
        <circle id="progressArc" cx="130" cy="130" r="122" fill="none"
          stroke="var(--inhale)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="767" stroke-dashoffset="767"
          transform="rotate(-90 130 130)" filter="url(#rGlow)"/>
        <!-- Nose bridge -->
        <path d="M 130,68 C 118,86 96,116 82,148 C 73,166 76,175 82,178"
              fill="none" stroke="#252b35" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 130,68 C 142,86 164,116 178,148 C 187,166 184,175 178,178"
              fill="none" stroke="#252b35" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 82,178 Q 130,195 178,178"
              fill="none" stroke="#252b35" stroke-width="2.5" stroke-linecap="round"/>
        <!-- LEFT nostril -->
        <ellipse cx="82" cy="192" rx="26" ry="18" fill="#0c0f13" stroke="#1c2028" stroke-width="1.5"/>
        <ellipse id="leftGlow" cx="82" cy="192" rx="26" ry="18"
          fill="#5ba4d92e" stroke="#5ba4d9" stroke-width="2.5" filter="url(#nGlow)" opacity="0"/>
        <ellipse id="leftClosed" cx="82" cy="192" rx="26" ry="18" fill="#1a1e26" opacity="0"/>
        <g id="leftX" opacity="0">
          <line x1="70" y1="183" x2="94" y2="201" stroke="#3a3f4a" stroke-width="2" stroke-linecap="round"/>
          <line x1="94" y1="183" x2="70" y2="201" stroke="#3a3f4a" stroke-width="2" stroke-linecap="round"/>
        </g>
        <text id="leftLabel" x="82" y="222" text-anchor="middle"
          font-size="8" font-family="DM Sans,sans-serif" letter-spacing="2" fill="#4e4d4a">LEFT</text>
        <g id="leftFlowIn" opacity="0">
          <circle class="dot-flow-up" cx="82" cy="198" r="2.5" fill="#5ba4d9"/>
          <circle class="dot-flow-up" cx="78" cy="195" r="2" fill="#5ba4d9"/>
          <circle class="dot-flow-up" cx="86" cy="195" r="2" fill="#5ba4d9"/>
        </g>
        <g id="leftFlowOut" opacity="0">
          <circle class="dot-flow-down" cx="82" cy="186" r="2.5" fill="#5bd9a4"/>
          <circle class="dot-flow-down" cx="78" cy="189" r="2" fill="#5bd9a4"/>
          <circle class="dot-flow-down" cx="86" cy="189" r="2" fill="#5bd9a4"/>
        </g>
        <!-- RIGHT nostril -->
        <ellipse cx="178" cy="192" rx="26" ry="18" fill="#0c0f13" stroke="#1c2028" stroke-width="1.5"/>
        <ellipse id="rightGlow" cx="178" cy="192" rx="26" ry="18"
          fill="#5ba4d92e" stroke="#5ba4d9" stroke-width="2.5" filter="url(#nGlow)" opacity="0"/>
        <ellipse id="rightClosed" cx="178" cy="192" rx="26" ry="18" fill="#1a1e26" opacity="0"/>
        <g id="rightX" opacity="0">
          <line x1="166" y1="183" x2="190" y2="201" stroke="#3a3f4a" stroke-width="2" stroke-linecap="round"/>
          <line x1="190" y1="183" x2="166" y2="201" stroke="#3a3f4a" stroke-width="2" stroke-linecap="round"/>
        </g>
        <text id="rightLabel" x="178" y="222" text-anchor="middle"
          font-size="8" font-family="DM Sans,sans-serif" letter-spacing="2" fill="#4e4d4a">RIGHT</text>
        <g id="rightFlowIn" opacity="0">
          <circle class="dot-flow-up" cx="178" cy="198" r="2.5" fill="#5ba4d9"/>
          <circle class="dot-flow-up" cx="174" cy="195" r="2" fill="#5ba4d9"/>
          <circle class="dot-flow-up" cx="182" cy="195" r="2" fill="#5ba4d9"/>
        </g>
        <g id="rightFlowOut" opacity="0">
          <circle class="dot-flow-down" cx="178" cy="186" r="2.5" fill="#5bd9a4"/>
          <circle class="dot-flow-down" cx="174" cy="189" r="2" fill="#5bd9a4"/>
          <circle class="dot-flow-down" cx="182" cy="189" r="2" fill="#5bd9a4"/>
        </g>
      </svg>

      <div class="box-center">
        <div class="breath-circle" id="breathCircle"></div>
        <div class="phase-text" id="phaseText">Ready</div>
        <div class="count-text" id="countText">4</div>
        <div class="guide-text hidden" id="guideText"></div>
        <div class="cycle-text" id="cycleText"></div>
      </div>
    </div>

    <div class="total-bar-wrap hidden" id="totalBarWrap">
      <div class="total-bar-label">
        <span id="elapsed">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="total-bar-track">
        <div class="total-bar" id="totalBar"></div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--inhale)"></div>Inhale</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--hold)"></div>Hold</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--exhale)"></div>Exhale</div>
      <div class="legend-item" id="legendHold2"><div class="legend-dot" style="background:var(--hold2)"></div>Hold</div>
    </div>

    <div class="options" id="options">
      <label>Session Duration</label>
      <div class="dur-row">
        <button class="dur-btn" data-min="2">2 min</button>
        <button class="dur-btn selected" data-min="5">5 min</button>
        <button class="dur-btn" data-min="10">10 min</button>
        <button class="dur-btn" data-min="15">15 min</button>
        <button class="dur-btn" data-min="20">20 min</button>
      </div>
    </div>

    <label class="toggle-row">
      <span>Sound cues</span>
      <input type="checkbox" id="soundToggle" checked>
      <div class="toggle-track"></div>
    </label>

    <button class="start-btn" id="startBtn">Begin</button>
  </div>

  <script>
    // ── Audio ──────────────────────────────────────────────────────────────
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playTick() {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx(), t = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, t);
      g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t + 0.15);
    }
    function playPhaseChange(freq) {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx(), t = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t + 0.5);
    }
    function playGong() {
      if (!document.getElementById('soundToggle').checked) return;
      const ctx = getCtx(), t = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.35, t); master.gain.exponentialRampToValueAtTime(0.001, t + 4);
      master.connect(ctx.destination);
      [130, 195, 260, 390].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.3 / (i + 1), t); g.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
        o.connect(g); g.connect(master); o.start(t); o.stop(t + 4);
      });
    }

    // ── Phase data ─────────────────────────────────────────────────────────
    const boxPhases = [
      { name: 'Inhale', hex: '#5ba4d9', freq: 396 },
      { name: 'Hold',   hex: '#a78bfa', freq: 528 },
      { name: 'Exhale', hex: '#5bd9a4', freq: 432 },
      { name: 'Hold',   hex: '#d9a45b', freq: 480 },
    ];
    // Nadi Sodhana: inhale-left → hold → exhale-right → inhale-right → hold → exhale-left
    const nadiPhases = [
      { name: 'Inhale', guide: 'Left nostril',  hex: '#5ba4d9', open: 'left',  flow: 'in',  freq: 396 },
      { name: 'Hold',   guide: 'Both closed',   hex: '#a78bfa', open: 'none',  flow: null,  freq: 528 },
      { name: 'Exhale', guide: 'Right nostril', hex: '#5bd9a4', open: 'right', flow: 'out', freq: 432 },
      { name: 'Inhale', guide: 'Right nostril', hex: '#5ba4d9', open: 'right', flow: 'in',  freq: 396 },
      { name: 'Hold',   guide: 'Both closed',   hex: '#a78bfa', open: 'none',  flow: null,  freq: 528 },
      { name: 'Exhale', guide: 'Left nostril',  hex: '#5bd9a4', open: 'left',  flow: 'out', freq: 432 },
    ];
    const BEAT = 4;
    const RING_CIRC = 2 * Math.PI * 122; // ~767 — matches r=122 in nostril SVG

    // ── Box path geometry ──────────────────────────────────────────────────
    const sides = [
      { x1: 40, y1: 40, x2: 220, y2: 40 },
      { x1: 220, y1: 40, x2: 220, y2: 220 },
      { x1: 220, y1: 220, x2: 40, y2: 220 },
      { x1: 40, y1: 220, x2: 40, y2: 40 },
    ];

    // ── DOM refs ───────────────────────────────────────────────────────────
    const phaseText    = document.getElementById('phaseText');
    const countText    = document.getElementById('countText');
    const guideText    = document.getElementById('guideText');
    const cycleText    = document.getElementById('cycleText');
    const breathCircle = document.getElementById('breathCircle');
    const boxPath      = document.getElementById('boxPath');
    const moveDot      = document.getElementById('moveDot');
    const startBtn     = document.getElementById('startBtn');
    const optionsEl    = document.getElementById('options');
    const totalBarWrap = document.getElementById('totalBarWrap');
    const totalBar     = document.getElementById('totalBar');
    const elapsedEl    = document.getElementById('elapsed');
    const totalTimeEl  = document.getElementById('totalTime');
    const boxWrap      = document.getElementById('boxWrap');
    const boxSvg       = document.getElementById('boxSvg');
    const noseSvg      = document.getElementById('noseSvg');
    const subtitleEl   = document.getElementById('subtitle');
    const legendHold2  = document.getElementById('legendHold2');
    const progressArc  = document.getElementById('progressArc');
    const leftGlow     = document.getElementById('leftGlow');
    const rightGlow    = document.getElementById('rightGlow');
    const leftClosed   = document.getElementById('leftClosed');
    const rightClosed  = document.getElementById('rightClosed');
    const leftX        = document.getElementById('leftX');
    const rightX       = document.getElementById('rightX');
    const leftLabel    = document.getElementById('leftLabel');
    const rightLabel   = document.getElementById('rightLabel');
    const leftFlowIn   = document.getElementById('leftFlowIn');
    const leftFlowOut  = document.getElementById('leftFlowOut');
    const rightFlowIn  = document.getElementById('rightFlowIn');
    const rightFlowOut = document.getElementById('rightFlowOut');

    let selectedMinutes = 5;
    let running = false;
    let animFrame = null;
    let currentTech = 'box';

    // ── Duration buttons ───────────────────────────────────────────────────
    document.querySelectorAll('.dur-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (running) return;
        document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMinutes = parseInt(btn.dataset.min);
      });
    });

    // ── Technique switcher ─────────────────────────────────────────────────
    document.querySelectorAll('.tech-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (running) return;
        switchTechnique(btn.dataset.tech);
      });
    });

    function switchTechnique(tech) {
      currentTech = tech;
      document.querySelectorAll('.tech-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.tech === tech));
      if (tech === 'box') {
        boxSvg.classList.remove('hidden');
        noseSvg.classList.add('hidden');
        boxWrap.classList.remove('nadi-mode');
        subtitleEl.textContent = 'Box Breathing — 4 · 4 · 4 · 4';
        legendHold2.classList.remove('hidden');
        breathCircle.style.display = '';
        guideText.classList.add('hidden');
        resetBoxVisual();
      } else {
        boxSvg.classList.add('hidden');
        noseSvg.classList.remove('hidden');
        boxWrap.classList.add('nadi-mode');
        subtitleEl.textContent = 'Nadi Sodhana — Alternate Nostril';
        legendHold2.classList.add('hidden');
        breathCircle.style.display = 'none';
        guideText.classList.remove('hidden');
        resetNadiVisual();
      }
      phaseText.textContent = 'Ready';
      phaseText.style.color = 'var(--text)';
      countText.textContent = '4';
      countText.style.color = 'var(--text)';
      guideText.textContent = '';
      cycleText.textContent = '';
    }

    // ── Box visual helpers ─────────────────────────────────────────────────
    function setDotPosition(sideIndex, fraction) {
      const s = sides[sideIndex];
      moveDot.setAttribute('cx', s.x1 + (s.x2 - s.x1) * fraction);
      moveDot.setAttribute('cy', s.y1 + (s.y2 - s.y1) * fraction);
    }
    function setBoxProgress(sideIndex, fraction) {
      boxPath.style.strokeDashoffset = 720 - (sideIndex * 180 + fraction * 180);
    }
    function resetBoxVisual() {
      boxPath.style.strokeDashoffset = 720;
      moveDot.setAttribute('cx', 40); moveDot.setAttribute('cy', 40);
      moveDot.setAttribute('fill', 'var(--inhale)');
      boxPath.setAttribute('stroke', 'var(--inhale)');
    }

    // ── Nadi visual helpers ────────────────────────────────────────────────
    const nadiEls = [leftGlow, rightGlow, leftClosed, rightClosed, leftX, rightX,
                     leftFlowIn, leftFlowOut, rightFlowIn, rightFlowOut];

    function applyNostrilState(p, phaseFrac) {
      nadiEls.forEach(el => el.setAttribute('opacity', '0'));
      leftLabel.setAttribute('fill', '#4e4d4a');
      rightLabel.setAttribute('fill', '#4e4d4a');

      const scale = p.name === 'Inhale' ? 1 + phaseFrac * 0.45
                  : p.name === 'Exhale' ? 1.45 - phaseFrac * 0.45
                  : 1.45;

      if (p.open === 'left') {
        leftGlow.setAttribute('fill', p.hex + '2e');
        leftGlow.setAttribute('stroke', p.hex);
        leftGlow.setAttribute('opacity', '1');
        leftGlow.style.transform = `scale(${scale})`;
        leftLabel.setAttribute('fill', p.hex);
        rightClosed.setAttribute('opacity', '0.65');
        rightX.setAttribute('opacity', '1');
        if (p.flow === 'in')  leftFlowIn.setAttribute('opacity', '1');
        if (p.flow === 'out') leftFlowOut.setAttribute('opacity', '1');
      } else if (p.open === 'right') {
        rightGlow.setAttribute('fill', p.hex + '2e');
        rightGlow.setAttribute('stroke', p.hex);
        rightGlow.setAttribute('opacity', '1');
        rightGlow.style.transform = `scale(${scale})`;
        rightLabel.setAttribute('fill', p.hex);
        leftClosed.setAttribute('opacity', '0.65');
        leftX.setAttribute('opacity', '1');
        if (p.flow === 'in')  rightFlowIn.setAttribute('opacity', '1');
        if (p.flow === 'out') rightFlowOut.setAttribute('opacity', '1');
      } else {
        leftClosed.setAttribute('opacity', '0.65');
        rightClosed.setAttribute('opacity', '0.65');
        leftX.setAttribute('opacity', '1');
        rightX.setAttribute('opacity', '1');
      }
    }

    function resetNadiVisual() {
      nadiEls.forEach(el => el.setAttribute('opacity', '0'));
      leftLabel.setAttribute('fill', '#4e4d4a');
      rightLabel.setAttribute('fill', '#4e4d4a');
      leftGlow.style.transform = '';
      rightGlow.style.transform = '';
      progressArc.style.strokeDashoffset = RING_CIRC;
    }

    // ── Shared helpers ─────────────────────────────────────────────────────
    function formatTime(secs) {
      const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    // ── Session ────────────────────────────────────────────────────────────
    function startSession() {
      running = true;
      startBtn.textContent = 'Stop';
      optionsEl.style.opacity = '0.3';
      optionsEl.style.pointerEvents = 'none';
      totalBarWrap.classList.remove('hidden');

      const phases = currentTech === 'box' ? boxPhases : nadiPhases;
      const CYCLE  = BEAT * phases.length;
      const totalSecs = selectedMinutes * 60;
      totalTimeEl.textContent = formatTime(totalSecs);
      const startTime = performance.now();
      let lastCount = -1, lastPhase = -1;

      playGong();

      function tick() {
        const elapsedSecs = (performance.now() - startTime) / 1000;
        if (elapsedSecs >= totalSecs) { endSession(); return; }

        totalBar.style.width = (elapsedSecs / totalSecs * 100) + '%';
        elapsedEl.textContent = formatTime(elapsedSecs);

        const cycleTime    = elapsedSecs % CYCLE;
        const phaseIndex   = Math.floor(cycleTime / BEAT);
        const phaseTime    = cycleTime - phaseIndex * BEAT;
        const phaseFrac    = phaseTime / BEAT;
        const currentCount = BEAT - Math.floor(phaseTime);
        const cycleNum     = Math.floor(elapsedSecs / CYCLE) + 1;
        const p            = phases[phaseIndex];

        phaseText.textContent = p.name;
        phaseText.style.color = p.hex;
        countText.textContent = currentCount;
        countText.style.color = p.hex;
        cycleText.textContent = `Cycle ${cycleNum}`;
        totalBar.style.background = p.hex;

        if (currentTech === 'box') {
          breathCircle.style.background = p.hex;
          breathCircle.className = 'breath-circle ' +
            ['inhale','hold','exhale','hold2'][phaseIndex];
          moveDot.setAttribute('fill', p.hex);
          boxPath.setAttribute('stroke', p.hex);
          setDotPosition(phaseIndex, phaseFrac);
          setBoxProgress(phaseIndex, phaseFrac);
        } else {
          guideText.textContent = p.guide;
          guideText.style.color = p.hex + 'bb';
          applyNostrilState(p, phaseFrac);
          progressArc.style.strokeDashoffset = RING_CIRC * (1 - cycleTime / CYCLE);
          progressArc.setAttribute('stroke', p.hex);
        }

        if (phaseIndex !== lastPhase) { playPhaseChange(p.freq); lastPhase = phaseIndex; }
        if (currentCount !== lastCount) { if (lastCount !== -1) playTick(); lastCount = currentCount; }

        animFrame = requestAnimationFrame(tick);
      }
      animFrame = requestAnimationFrame(tick);
    }

    function endSession() {
      running = false;
      cancelAnimationFrame(animFrame);
      playGong(); setTimeout(playGong, 1500); setTimeout(playGong, 3000);
      phaseText.textContent = 'Complete';
      phaseText.style.color = 'var(--exhale)';
      countText.textContent = '🙏';
      guideText.textContent = '';
      cycleText.textContent = `${selectedMinutes} minutes`;
      totalBar.style.width = '100%';
      startBtn.textContent = 'Begin';
      optionsEl.style.opacity = '1';
      optionsEl.style.pointerEvents = 'auto';
      if (currentTech === 'box') { resetBoxVisual(); }
      else { progressArc.style.strokeDashoffset = 0; resetNadiVisual(); }
    }

    function stopSession() {
      running = false;
      cancelAnimationFrame(animFrame);
      phaseText.textContent = 'Ready';
      phaseText.style.color = 'var(--text)';
      countText.textContent = '4';
      countText.style.color = 'var(--text)';
      guideText.textContent = '';
      cycleText.textContent = '';
      startBtn.textContent = 'Begin';
      optionsEl.style.opacity = '1';
      optionsEl.style.pointerEvents = 'auto';
      totalBarWrap.classList.add('hidden');
      totalBar.style.width = '0%';
      if (currentTech === 'box') { resetBoxVisual(); }
      else { resetNadiVisual(); }
    }

    startBtn.addEventListener('click', () => {
      if (running) stopSession(); else startSession();
    });
  </script>
</body>
</html>
