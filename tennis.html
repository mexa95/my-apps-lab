<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Tennis: Power-Up Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #14181c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Impact', 'Arial Black', sans-serif;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      body { cursor: default; }
      #mobile-hint { display: block; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="mobile-hint">Touch &amp; drag to move paddle</div>
  <!--
    Hidden text field used ONLY to pop the mobile soft keyboard on the
    join-code screen. It's not display:none (mobile browsers will refuse
    to focus a hidden input); instead it's positioned off-screen but
    remains focusable. See handleTap + JOIN GAME button handler for the
    focus() calls that open the keyboard.
  -->
  <input
    id="join-input"
    type="text"
    inputmode="text"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="characters"
    spellcheck="false"
    maxlength="4"
    aria-label="Room code"
    style="position:fixed; top:-100px; left:-100px; width:40px; height:40px; opacity:0; pointer-events:none;"
  />
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const W = 1000, H = 600;
    canvas.width = W;
    canvas.height = H;

    // Scale for responsiveness
    function resize() {
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let gameState = 'menu'; // 'menu' | 'playing' | 'gameover'
    let difficulty = 'medium';
    let winScore = 5;
    let winner = null;

    // Network state
    let netMode = 'local'; // 'local' | 'host' | 'guest'
    let menuScreen = 'main'; // main|onlineChoice|onlineHostWait|onlineJoinInput|onlineConnecting|onlineError
    let joinCodeInput = '';

    // Hidden mobile-keyboard input for the room-code entry screen.
    // On mobile, focus() must be called from within a user-gesture handler
    // (touchend/click) — see handleTap and the JOIN GAME button action.
    const joinInput = document.getElementById('join-input');
    function focusJoinInput() {
      // pointer-events:none is lifted only while focus is needed so the
      // element stays click-transparent when off-screen.
      joinInput.style.pointerEvents = 'auto';
      joinInput.value = joinCodeInput;
      try { joinInput.focus({ preventScroll: true }); } catch { joinInput.focus(); }
    }
    function blurJoinInput() {
      joinInput.blur();
      joinInput.value = '';
      joinInput.style.pointerEvents = 'none';
    }
    joinInput.addEventListener('input', () => {
      // Filter to [A-Z0-9], uppercase, cap at 4. Keep joinCodeInput and the
      // input element in sync so re-focusing never clobbers typed chars.
      const cleaned = joinInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
      joinCodeInput = cleaned;
      if (joinInput.value !== cleaned) joinInput.value = cleaned;
    });
    // Enter on the mobile keyboard submits the join.
    joinInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && menuScreen === 'onlineJoinInput' && joinCodeInput.length === 4) {
        e.preventDefault();
        net.join(joinCodeInput);
      }
    });

    // Input
    let mouseY = H / 2;
    function getCanvasPos(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((clientX - rect.left) / rect.width) * W,
        y: ((clientY - rect.top) / rect.height) * H
      };
    }
    document.addEventListener('mousemove', e => {
      const pos = getCanvasPos(e.clientX, e.clientY);
      if (gameState === 'playing') {
        mouseY = pos.y;
      } else if (gameState === 'menu') {
        const over = menuButtons.some(b => pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h);
        canvas.style.cursor = over ? 'pointer' : 'default';
      }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    document.addEventListener('keydown', e => {
      // Room-code entry: character/backspace/Enter are handled natively by
      // the hidden <input id="join-input"> and its own event listeners. We
      // only need Escape here to cancel back to the online-choice screen.
      if (gameState === 'menu' && menuScreen === 'onlineJoinInput') {
        if (e.key === 'Escape') {
          menuScreen = 'onlineChoice';
          joinCodeInput = '';
          blurJoinInput();
          e.preventDefault();
        }
        return;
      }
      if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === 'menu' && menuScreen === 'main') startGame('local');
        else if (gameState === 'gameover') {
          // Tell peer we're leaving so they see OPPONENT LEFT instantly
          // instead of waiting on the watchdog.
          if (netMode === 'host' || netMode === 'guest') {
            try { netSafeSend({ t: 'bye' }); } catch {}
          }
          showMenu();
        }
      }
    });

    // Colors
    const BG = '#14181c';
    const TABLE = '#196e37';
    const BALL_COLOR = '#ffb432';
    const POWERUP_COLOR = '#ffd700';

    // --- Classes ---
    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.radius = 2 + Math.random() * 3;
        this.color = color;
        this.life = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.06;
        this.radius -= 0.1;
      }
      draw() {
        if (this.life <= 0 || this.radius <= 0) return;
        const r = Math.max(0.5, this.radius);
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        // Soft glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    class PowerUp {
      constructor() {
        this.x = 0; this.y = 0;
        this.radius = 15;
        this.active = false;
        this.spawnTimer = 0;
        this.pulse = 0;
      }
      update() {
        if (!this.active) {
          this.spawnTimer++;
          if (this.spawnTimer > 300) {
            this.active = true;
            this.x = W / 4 + Math.random() * (W / 2);
            this.y = 100 + Math.random() * (H - 200);
            this.spawnTimer = 0;
          }
        } else {
          this.pulse += 0.1;
        }
      }
      reset() { this.active = false; this.spawnTimer = 0; this.pulse = 0; }
      draw() {
        if (!this.active) return;
        ctx.save();
        const glowR = this.radius + Math.abs(Math.sin(this.pulse * 2.5)) * 6;
        // Outer glow halo
        const outerGlow = ctx.createRadialGradient(this.x, this.y, this.radius * 0.5, this.x, this.y, glowR + 8);
        outerGlow.addColorStop(0, 'rgba(255,215,0,0.5)');
        outerGlow.addColorStop(0.6, 'rgba(255,215,0,0.15)');
        outerGlow.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowR + 8, 0, Math.PI * 2);
        ctx.fillStyle = outerGlow;
        ctx.fill();
        // Main orb with gradient
        const orbGrad = ctx.createRadialGradient(
          this.x - 3, this.y - 3, 1,
          this.x, this.y, this.radius
        );
        orbGrad.addColorStop(0, '#fff8dc');
        orbGrad.addColorStop(0.4, '#ffe44d');
        orbGrad.addColorStop(1, '#cca000');
        ctx.shadowColor = POWERUP_COLOR;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = orbGrad;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Star icon
        ctx.fillStyle = 'rgba(120,80,0,0.8)';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', this.x, this.y + 1);
        ctx.restore();
      }
    }

    class Paddle {
      constructor(x, color) {
        this.baseHeight = 100;
        this.x = x;
        this.y = H / 2 - 50;
        this.w = 16;
        this.h = this.baseHeight;
        this.color = color;
        this.vy = 0;
        this.lastY = this.y;
        this.powerTimer = 0;
      }
      get centerY() { return this.y + this.h / 2; }
      set centerY(v) { this.y = v - this.h / 2; }
      updateVelocity() {
        this.vy = this.y - this.lastY;
        this.lastY = this.y;
        if (this.powerTimer > 0) {
          this.powerTimer--;
          if (this.powerTimer <= 0) this.h = this.baseHeight;
        }
      }
      activatePowerup() {
        this.h = 200;
        this.powerTimer = 600;
      }
      clamp() {
        const minY = 50;
        const maxY = H - 50 - this.h;
        this.y = Math.max(minY, Math.min(this.y, maxY));
      }
      draw() {
        const r = 5;
        ctx.save();
        // Drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;
        // Main paddle body
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = this.color;
        ctx.fill();
        // Clear shadow for overlays
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        // 3D gradient overlay (light left edge, dark right edge)
        const shadeGrad = ctx.createLinearGradient(this.x, 0, this.x + this.w, 0);
        shadeGrad.addColorStop(0, 'rgba(255,255,255,0.28)');
        shadeGrad.addColorStop(0.45, 'rgba(255,255,255,0.06)');
        shadeGrad.addColorStop(1, 'rgba(0,0,0,0.22)');
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = shadeGrad;
        ctx.fill();
        // Top-to-bottom subtle shading
        const vGrad = ctx.createLinearGradient(0, this.y, 0, this.y + this.h);
        vGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
        vGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
        vGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = vGrad;
        ctx.fill();
        // Edge highlight
        ctx.beginPath();
        ctx.roundRect(this.x + 0.5, this.y + 0.5, this.w - 1, this.h - 1, r);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Power-up glow
        if (this.powerTimer > 0) {
          ctx.shadowColor = POWERUP_COLOR;
          ctx.shadowBlur = 22;
          ctx.beginPath();
          ctx.roundRect(this.x - 3, this.y - 3, this.w + 6, this.h + 6, r + 3);
          ctx.strokeStyle = POWERUP_COLOR;
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        ctx.restore();
      }
    }

    class Ball {
      constructor() {
        this.radius = 10;
        this.trail = [];
        this.reset();
      }
      reset() {
        this.x = W / 2;
        this.y = H / 2;
        this.vx = (Math.random() < 0.5 ? -1 : 1) * 8;
        this.vy = (Math.random() - 0.5) * 6;
        this.spin = 0;
        this.trail = [];
        this.lastHit = null;
      }
      update() {
        this.vy += this.spin * 0.05;
        this.spin *= 0.98;
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > 22) {
          this.vx = (this.vx / speed) * 22;
          this.vy = (this.vy / speed) * 22;
        }
        this.x += this.vx;
        this.y += this.vy;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 10) this.trail.shift();
        if (this.y <= 50 || this.y >= H - 50) {
          this.vy *= -1;
          this.spin *= 0.6;
          this.y = Math.max(50, Math.min(this.y, H - 50));
        }
      }
      draw() {
        // Shadow on the court surface
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(this.x + 3, this.y + 3, this.radius * 1.1, this.radius * 0.55, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fill();
        // Motion trail with soft glow
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const progress = i / this.trail.length;
          const size = this.radius * progress * 0.85;
          if (size < 0.5) continue;
          const alpha = progress * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,180,50,${alpha})`;
          ctx.fill();
        }
        // Main ball with radial gradient for 3D sphere look
        const grad = ctx.createRadialGradient(
          this.x - this.radius * 0.3, this.y - this.radius * 0.35, this.radius * 0.08,
          this.x, this.y, this.radius
        );
        grad.addColorStop(0, '#ffe8a0');
        grad.addColorStop(0.35, '#ffcc44');
        grad.addColorStop(0.7, BALL_COLOR);
        grad.addColorStop(1, '#b87800');
        ctx.shadowColor = 'rgba(255,180,50,0.4)';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Crisp edge ring
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(160,100,0,0.35)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // Specular highlight
        ctx.beginPath();
        ctx.arc(this.x - this.radius * 0.25, this.y - this.radius * 0.3, this.radius * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
        ctx.restore();
      }
    }

    // --- Setup ---
    const user = new Paddle(50, '#dc3232');
    const ai   = new Paddle(W - 65, '#3264dc');
    const ball = new Ball();
    const powerup = new PowerUp();
    let particles = [];
    let scoreUser = 0, scoreAI = 0;

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, color));
    }
    function rectCollide(bx, by, br, rx, ry, rw, rh) {
      return bx + br > rx && bx - br < rx + rw && by + br > ry && by - br < ry + rh;
    }

    // --- Menu ---
    let menuButtons = [];
    // Separate hit-test list for the gameover overlay (REMATCH / MAIN MENU
    // buttons live outside the menu state machine).
    let gameoverButtons = [];
    let menuPulse = 0;

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function handleTap(clientX, clientY) {
      const pos = getCanvasPos(clientX, clientY);
      if (gameState === 'menu') {
        let hit = false;
        for (const btn of menuButtons) {
          if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
            btn.action();
            hit = true;
            break;
          }
        }
        // If the user is on the join-code screen and tapped somewhere that
        // isn't a button (e.g. on the code boxes to re-open a dismissed
        // mobile keyboard), re-focus the hidden input. Must run in the
        // touchend/click user-gesture stack for focus() to work on mobile.
        if (!hit && menuScreen === 'onlineJoinInput') {
          focusJoinInput();
        }
      } else if (gameState === 'gameover') {
        for (const btn of gameoverButtons) {
          if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
            btn.action();
            return;
          }
        }
        // Fallback (e.g. disconnect screen has no buttons): tap anywhere to
        // return to menu.
        if (gameoverButtons.length === 0) showMenu();
      }
    }

    function drawMenuBackground() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);
      // Faint table background
      ctx.fillStyle = 'rgba(25,110,55,0.12)';
      ctx.fillRect(40, 50, W - 80, H - 100);
    }

    function drawMenuTitle(subtitle) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 72px Impact, Arial Black, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('TABLE TENNIS', W / 2, 90);
      ctx.font = '22px sans-serif';
      ctx.fillStyle = POWERUP_COLOR;
      ctx.fillText(subtitle || '⚡ Power-Up Edition', W / 2, 130);
    }

    function drawMainMenu() {
      drawMenuTitle();

      // Difficulty
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('DIFFICULTY', W / 2, 180);

      const diffs = [
        { key: 'easy',   label: 'Easy',   color: '#00e5a0' },
        { key: 'medium', label: 'Medium', color: POWERUP_COLOR },
        { key: 'hard',   label: 'Hard',   color: '#dc3232' },
      ];
      const bw = 160, bh = 48, gap = 20;
      const totalBW = diffs.length * bw + (diffs.length - 1) * gap;
      diffs.forEach((d, i) => {
        const x = W / 2 - totalBW / 2 + i * (bw + gap);
        const y = 196;
        const sel = difficulty === d.key;
        ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.08)';
        roundRect(x, y, bw, bh, 8);
        ctx.fillStyle = sel ? '#000' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}18px sans-serif`;
        ctx.fillText(d.label, x + bw / 2, y + bh / 2);
        menuButtons.push({ x, y, w: bw, h: bh, action: () => { difficulty = d.key; } });
      });

      // Score limit
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('FIRST TO', W / 2, 280);

      const scores = [5, 7, 10];
      const sbw = 120, sbh = 48, sgap = 24;
      const totalSW = scores.length * sbw + (scores.length - 1) * sgap;
      scores.forEach((s, i) => {
        const x = W / 2 - totalSW / 2 + i * (sbw + sgap);
        const y = 296;
        const sel = winScore === s;
        ctx.fillStyle = sel ? '#3264dc' : 'rgba(255,255,255,0.08)';
        roundRect(x, y, sbw, sbh, 8);
        ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}28px Impact, sans-serif`;
        ctx.fillText(s, x + sbw / 2, y + sbh / 2 + 1);
        menuButtons.push({ x, y, w: sbw, h: sbh, action: () => { winScore = s; } });
      });

      // Play vs AI button (pulsing)
      const pw = 260, ph = 60;
      const px = W / 2 - pw / 2, py = 388;
      const pulse = 1 + 0.04 * Math.sin(menuPulse * 3);
      ctx.save();
      ctx.translate(W / 2, py + ph / 2);
      ctx.scale(pulse, pulse);
      ctx.translate(-W / 2, -(py + ph / 2));
      ctx.fillStyle = '#00e5a0';
      roundRect(px, py, pw, ph, 12);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 24px Impact, Arial Black, sans-serif';
      ctx.fillText('▶  PLAY vs AI', W / 2, py + ph / 2 + 1);
      ctx.restore();
      menuButtons.push({ x: px - 12, y: py - 12, w: pw + 24, h: ph + 24, action: () => startGame('local') });

      // Play Online button
      const ow = 260, oh = 54;
      const ox = W / 2 - ow / 2, oy = 472;
      ctx.fillStyle = '#3264dc';
      roundRect(ox, oy, ow, oh, 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px Impact, Arial Black, sans-serif';
      ctx.fillText('🌐  PLAY ONLINE', W / 2, oy + oh / 2 + 1);
      menuButtons.push({
        x: ox, y: oy, w: ow, h: oh,
        action: () => { menuScreen = 'onlineChoice'; }
      });
    }

    function drawBackButton(label, action) {
      const bw = 140, bh = 44;
      const bx = 30, by = H - 60;
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      roundRect(bx, by, bw, bh, 8);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, bx + bw / 2, by + bh / 2);
      menuButtons.push({ x: bx, y: by, w: bw, h: bh, action });
    }

    function drawOnlineChoice() {
      drawMenuTitle('🌐 Online Multiplayer');

      // Color picker: tap to claim a paddle color for this game.
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'center';
      ctx.fillText('PADDLE COLOR', W / 2, 180);

    function drawMenu() {
      drawMenuBackground();
      menuButtons = [];
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      switch (menuScreen) {
        case 'onlineChoice':    drawOnlineChoice(); break;
        case 'onlineHostWait':  drawOnlineHostWait(); break;
        case 'onlineJoinInput': drawOnlineJoinInput(); break;
        case 'onlineConnecting':drawOnlineConnecting(); break;
        case 'onlineError':     drawOnlineError(); break;
        default:                drawMainMenu(); break;
      }
    }

    function menuLoop() {
      if (gameState !== 'menu') return;
      menuPulse += 0.03;
      drawMenu();
      requestAnimationFrame(menuLoop);
    }

    // --- Networking (WebRTC DataChannel P2P, signaling via /api/signal) ---
    // Identity palette for online play. Keep these visually distinct.
    const PALETTE = ['#ff5050', '#3264dc', '#00e5a0', '#ff9028', '#a864ff', '#28e0e0'];
    function loadMyColor() {
      try {
        const saved = localStorage.getItem('tennis:color');
        if (saved && PALETTE.includes(saved)) return saved;
      } catch {}
      return PALETTE[Math.floor(Math.random() * PALETTE.length)];
    }
    function saveMyColor(c) { try { localStorage.setItem('tennis:color', c); } catch {} }

    const net = {
      role: null,            // 'host' | 'guest' | null
      pc: null,              // RTCPeerConnection
      dc: null,              // RTCDataChannel (ordered:false, maxRetransmits:0)
      room: null,
      state: 'idle',         // idle|creating|waiting|joining|connecting|connected|failed|closed
      errorMsg: null,
      latestSnapshot: null,  // last host->guest snapshot
      lastAppliedFrame: -1,
      remotePaddleY: H / 2,  // host: guest's reported paddle centerY
      lastRx: 0,             // timestamp of last received message
      iceAbort: null,        // AbortController for KV pollers
      sendTick: 0,
      pendingEvents: [],     // host: queued hit events to send with next snapshot
      remoteDescSet: false,  // whether setRemoteDescription has completed
      pendingIce: [],        // ICE candidates queued until remoteDescription is set
      connectDeadline: 0,    // timeout for connection establishment
      queryParamsShown: false,
      // Identity + rematch
      myColor: loadMyColor(),
      oppColor: null,        // populated on 'hi' handshake
      rematchMe: false,      // we clicked REMATCH
      rematchPeer: false,    // peer sent {t:'rm'}
    };

    // Apply myColor/oppColor to the correct paddle entity depending on role.
    // Host = left (user), Guest = right (ai). Safe to call any time.
    function applyColors() {
      if (netMode === 'host') {
        user.color = net.myColor;
        if (net.oppColor) ai.color = net.oppColor;
      } else if (netMode === 'guest') {
        ai.color = net.myColor;
        if (net.oppColor) user.color = net.oppColor;
      }
    }

    const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

    function randRoomCode() {
      const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
      let s = '';
      for (let i = 0; i < 4; i++) s += alphabet[Math.floor(Math.random() * alphabet.length)];
      return s;
    }

    async function postSignal(op, room, payload, signal) {
      let res;
      try {
        res = await fetch('/api/signal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ op, room, payload }),
          signal,
        });
      } catch (e) {
        console.warn('[net] fetch failed:', op, e);
        throw e;
      }
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text.slice(0, 200) }; }
      if (res.status >= 400) {
        console.warn('[net] signal error:', op, 'status', res.status, data);
      }
      return { status: res.status, data };
    }

    function describeSignalError(status, data, fallback) {
      if (status === 404) return 'Server endpoint /api/signal not found — is the function deployed?';
      if (status === 0)   return 'No response from server';
      const serverMsg = data && (data.error || data.raw);
      if (serverMsg) return `${fallback} (HTTP ${status}: ${serverMsg})`;
      return `${fallback} (HTTP ${status})`;
    }

    function netFail(msg) {
      console.warn('[net] fail:', msg);
      net.errorMsg = msg;
      net.state = 'failed';
      menuScreen = 'onlineError';
      netTeardown(false);
      // Flip to disconnect overlay from either live play or a gameover screen
      // (e.g. peer clicked MAIN MENU and sent bye while we were deciding rematch).
      if (gameState === 'playing' || gameState === 'gameover') {
        winner = 'disconnect';
        gameState = 'gameover';
        canvas.style.cursor = 'default';
      }
    }

    function netTeardown(notifyServer = true) {
      try { if (net.iceAbort) net.iceAbort.abort(); } catch {}
      try { if (net.dc) { net.dc.onopen = net.dc.onmessage = net.dc.onclose = null; net.dc.close(); } } catch {}
      try {
        if (net.pc) {
          net.pc.onicecandidate = null;
          net.pc.ondatachannel = null;
          net.pc.oniceconnectionstatechange = null;
          net.pc.close();
        }
      } catch {}
      if (notifyServer && net.room) {
        // fire-and-forget
        try { postSignal('close', net.room, {}).catch(() => {}); } catch {}
      }
      net.pc = null;
      net.dc = null;
      net.iceAbort = null;
      net.room = null;
      net.role = null;
      net.state = 'idle';
      net.latestSnapshot = null;
      net.lastAppliedFrame = -1;
      net.remotePaddleY = H / 2;
      net.lastRx = 0;
      net.sendTick = 0;
      net.pendingEvents.length = 0;
      net.remoteDescSet = false;
      net.pendingIce.length = 0;
      net.connectDeadline = 0;
      net.oppColor = null;
      net.rematchMe = false;
      net.rematchPeer = false;
    }

    async function flushPendingIce() {
      if (!net.remoteDescSet || !net.pc) return;
      while (net.pendingIce.length) {
        const c = net.pendingIce.shift();
        try { await net.pc.addIceCandidate(c); }
        catch (e) { console.warn('[net] addIceCandidate failed:', e); }
      }
    }

    async function pollAnswerLoop(signal) {
      while (!signal.aborted && net.pc && !net.remoteDescSet) {
        try {
          const { status, data } = await postSignal('pollAnswer', net.room, {}, signal);
          if (signal.aborted) return;
          if (status === 200 && data.sdp) {
            await net.pc.setRemoteDescription(data.sdp);
            net.remoteDescSet = true;
            await flushPendingIce();
            return;
          }
        } catch (e) {
          if (signal.aborted) return;
        }
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    async function pollIceLoop(remoteRole, signal) {
      while (!signal.aborted && net.pc) {
        try {
          const { status, data } = await postSignal('pollIce', net.room, { role: remoteRole }, signal);
          if (signal.aborted) return;
          if (status === 200 && Array.isArray(data.candidates)) {
            for (const c of data.candidates) {
              if (!net.remoteDescSet) {
                net.pendingIce.push(c);
              } else {
                try { await net.pc.addIceCandidate(c); }
                catch (e) { console.warn('[net] addIceCandidate failed:', e); }
              }
            }
          }
        } catch (e) {
          if (signal.aborted) return;
        }
        await new Promise(r => setTimeout(r, 500));
      }
    }

    function wireDataChannel(dc) {
      net.dc = dc;
      dc.onopen = () => {
        net.state = 'connected';
        net.lastRx = Date.now();
        // Keep ICE poller alive briefly for late candidates, then abort.
        setTimeout(() => { try { if (net.iceAbort) net.iceAbort.abort(); } catch {} }, 5000);
        // Host and guest both enter playing state here.
        startGame(net.role);
        // Identity handshake: share our palette choice with the peer.
        netSafeSend({ t: 'hi', color: net.myColor });
      };
      dc.onmessage = ev => handleNetMessage(ev.data);
      dc.onclose = () => {
        if (net.state === 'connected' || net.state === 'connecting') {
          netFail('Opponent disconnected');
        }
      };
    }

    function startConnectTimeout() {
      net.connectDeadline = Date.now() + 60000;
      const check = () => {
        if (net.state === 'connected' || net.state === 'closed' || net.state === 'failed') return;
        if (Date.now() >= net.connectDeadline) { netFail('Connection timed out'); return; }
        setTimeout(check, 1000);
      };
      setTimeout(check, 1000);
    }

    async function netHost() {
      netTeardown(false);
      net.role = 'host';
      net.state = 'creating';
      menuScreen = 'onlineHostWait';
      // Claim a room code (retry up to 3x on collision).
      let claimed = false;
      let lastStatus = 0, lastData = null;
      for (let i = 0; i < 3 && !claimed; i++) {
        const code = randRoomCode();
        try {
          const { status, data } = await postSignal('create', code, {});
          lastStatus = status; lastData = data;
          if (status === 201) { net.room = code; claimed = true; }
          else if (status !== 409) {
            netFail(describeSignalError(status, data, 'Could not create room'));
            return;
          }
        } catch { netFail('Could not reach server'); return; }
      }
      if (!claimed) {
        netFail(describeSignalError(lastStatus, lastData, 'Could not create room'));
        return;
      }

      try {
        net.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      } catch { netFail('WebRTC not supported'); return; }

      const dc = net.pc.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
      wireDataChannel(dc);

      net.iceAbort = new AbortController();
      const signal = net.iceAbort.signal;

      net.pc.onicecandidate = e => {
        if (!e.candidate) return;
        postSignal('ice', net.room, { role: 'host', candidate: e.candidate.toJSON() }, signal).catch(() => {});
      };
      net.pc.oniceconnectionstatechange = () => {
        if (!net.pc) return;
        const s = net.pc.iceConnectionState;
        if (s === 'failed') netFail('Connection failed (NAT). Try a different network.');
      };

      try {
        const offer = await net.pc.createOffer();
        await net.pc.setLocalDescription(offer);
        const { status, data } = await postSignal('offer', net.room, { sdp: { type: offer.type, sdp: offer.sdp } }, signal);
        if (status !== 200) { netFail(describeSignalError(status, data, 'Could not publish offer')); return; }
      } catch (e) {
        console.warn('[net] WebRTC setup failed (host):', e);
        netFail('WebRTC setup failed');
        return;
      }

      net.state = 'waiting';
      startConnectTimeout();
      pollAnswerLoop(signal);
      pollIceLoop('guest', signal);
    }

    async function netJoin(code) {
      netTeardown(false);
      net.role = 'guest';
      net.room = code;
      net.state = 'joining';
      menuScreen = 'onlineConnecting';

      let offer;
      try {
        const { status, data } = await postSignal('join', code, {});
        if (status === 404) { netFail('Room not found'); return; }
        if (status !== 200 || !data.sdp) {
          netFail(describeSignalError(status, data, 'Could not join room'));
          return;
        }
        offer = data.sdp;
      } catch { netFail('Could not reach server'); return; }

      try {
        net.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      } catch { netFail('WebRTC not supported'); return; }

      net.iceAbort = new AbortController();
      const signal = net.iceAbort.signal;

      net.pc.ondatachannel = e => wireDataChannel(e.channel);
      net.pc.onicecandidate = e => {
        if (!e.candidate) return;
        postSignal('ice', net.room, { role: 'guest', candidate: e.candidate.toJSON() }, signal).catch(() => {});
      };
      net.pc.oniceconnectionstatechange = () => {
        if (!net.pc) return;
        const s = net.pc.iceConnectionState;
        if (s === 'failed') netFail('Connection failed (NAT). Try a different network.');
      };

      try {
        await net.pc.setRemoteDescription(offer);
        net.remoteDescSet = true;
        await flushPendingIce();
        const answer = await net.pc.createAnswer();
        await net.pc.setLocalDescription(answer);
        const { status, data } = await postSignal('answer', code, { sdp: { type: answer.type, sdp: answer.sdp } }, signal);
        if (status !== 200) { netFail(describeSignalError(status, data, 'Could not publish answer')); return; }
      } catch (e) {
        console.warn('[net] WebRTC setup failed (guest):', e);
        netFail('WebRTC setup failed');
        return;
      }

      net.state = 'connecting';
      startConnectTimeout();
      pollIceLoop('host', signal);
    }

    function netSafeSend(obj) {
      if (!net.dc || net.dc.readyState !== 'open') return;
      try { net.dc.send(JSON.stringify(obj)); } catch {}
    }

    function netSendSnapshot() {
      const snap = {
        t: 's',
        f: net.sendTick,
        ts: Date.now(),
        b: [ball.x, ball.y, ball.vx, ball.vy, ball.spin],
        u: [user.y, user.h],
        a: [ai.y, ai.h],
        pu: powerup.active ? [powerup.x, powerup.y] : null,
        s: [scoreUser, scoreAI],
        st: gameState,
      };
      netSafeSend(snap);
      // Flush any pending hit events captured during this physics tick.
      for (const ev of net.pendingEvents) netSafeSend(ev);
      net.pendingEvents.length = 0;
    }

    function netSendInput() {
      // Guest sends the RIGHT paddle's centerY (guest controls ai entity).
      netSafeSend({ t: 'i', y: ai.centerY, ts: Date.now() });
    }

    function handleNetMessage(raw) {
      net.lastRx = Date.now();
      let msg;
      try { msg = JSON.parse(raw); } catch { return; }
      if (!msg || typeof msg !== 'object') return;

      // Role-agnostic control messages (handshake / rematch / disconnect).
      if (msg.t === 'hi' && typeof msg.color === 'string' && PALETTE.includes(msg.color)) {
        net.oppColor = msg.color;
        applyColors();
        return;
      }
      if (msg.t === 'rm') {
        net.rematchPeer = true;
        return;
      }
      if (msg.t === 'bye') {
        netFail('Opponent left');
        return;
      }

      if (netMode === 'guest') {
        if (msg.t === 's') {
          if (typeof msg.f === 'number' && msg.f <= net.lastAppliedFrame) return;
          net.latestSnapshot = msg;
          if (typeof msg.f === 'number') net.lastAppliedFrame = msg.f;
        } else if (msg.t === 'h') {
          // Hit event: spawn particles locally for juice.
          const color = msg.who === 'user' ? user.color : ai.color;
          spawnParticles(msg.x, msg.y, msg.kind === 'powerup' ? POWERUP_COLOR : color);
        }
      } else if (netMode === 'host') {
        if (msg.t === 'i' && typeof msg.y === 'number') {
          net.remotePaddleY = msg.y;
        }
      }
    }

    function applySnapshotToEntities() {
      const s = net.latestSnapshot;
      if (!s) return;
      if (Array.isArray(s.b) && s.b.length >= 5) {
        ball.x = s.b[0]; ball.y = s.b[1];
        ball.vx = s.b[2]; ball.vy = s.b[3]; ball.spin = s.b[4];
        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 10) ball.trail.shift();
      }
      if (Array.isArray(s.u) && s.u.length >= 2) { user.y = s.u[0]; user.h = s.u[1]; }
      if (Array.isArray(s.a) && s.a.length >= 2) { ai.y = s.a[0];   ai.h = s.a[1]; }
      if (s.pu) { powerup.active = true; powerup.x = s.pu[0]; powerup.y = s.pu[1]; powerup.pulse += 0.1; }
      else { powerup.active = false; }
      if (Array.isArray(s.s) && s.s.length >= 2) { scoreUser = s.s[0]; scoreAI = s.s[1]; }
      if (s.st === 'gameover' && gameState === 'playing') {
        gameState = 'gameover';
        winner = scoreUser >= winScore ? 'user' : (scoreAI >= winScore ? 'ai' : winner);
        canvas.style.cursor = 'default';
      }
      // Host-authoritative rematch: if host transitions back to playing,
      // follow them and clear any leftover rematch UI affordance.
      if (s.st === 'playing' && gameState === 'gameover') {
        gameState = 'playing';
        winner = null;
        net.rematchMe = false;
        net.rematchPeer = false;
        canvas.style.cursor = 'none';
      }
    }

    // Host-authoritative rematch: resets world state and flips gameState.
    // Guest follows via the next 'playing' snapshot reverse-transition.
    function hostStartRematch() {
      scoreUser = 0; scoreAI = 0;
      winner = null;
      user.h = user.baseHeight; user.powerTimer = 0; user.y = H / 2 - 50;
      ai.h   = ai.baseHeight;   ai.powerTimer   = 0; ai.y   = H / 2 - 50;
      particles = [];
      powerup.reset();
      ball.reset();
      net.rematchMe = false;
      net.rematchPeer = false;
      gameState = 'playing';
      canvas.style.cursor = 'none';
      net.lastRx = Date.now(); // grace-period the watchdog across the gap
    }

    // Convenience aliases used by other parts of the file
    net.host = netHost;
    net.join = netJoin;
    net.teardown = netTeardown;

    // --- Game Loop ---
    function gameLoop() {
      // Allow 'gameover' through so async disconnect triggers (dc.onclose) still render the overlay.
      if (gameState === 'menu') return;

      // Apply remote state on guest before anything else so paddle/ball render correctly.
      if (netMode === 'guest' && net.latestSnapshot) applySnapshotToEntities();

      // Host watchdog: detect stale opponent (3s without any packet).
      // Guest sends a 2Hz heartbeat in gameover (rematch wait) so this still works there.
      if (netMode === 'host' && net.lastRx && Date.now() - net.lastRx > 3000) {
        netFail('Opponent disconnected');
        // Fall through to render one final frame with the gameover overlay.
      }

      // Host drives rematch once both sides have confirmed.
      if (netMode === 'host' && gameState === 'gameover' && net.rematchMe && net.rematchPeer) {
        hostStartRematch();
      }

      // --- Input & opponent paddle per mode ---
      // Skip input/AI when not actively playing so gameover is visually frozen
      // (and CPU idles — AI chase, mouse-tracking, etc. were all wasted work).
      if (gameState !== 'playing') {
        // still fall through to render
      } else if (netMode === 'local') {
        const aiSpeed    = { easy: 3.5, medium: 6,   hard: 9.5 }[difficulty];
        const aiDeadzone = { easy: 35,  medium: 15,  hard: 4   }[difficulty];
        const aiError    = { easy: 70,  medium: 0,   hard: 0   }[difficulty];

        user.centerY = mouseY;
        user.clamp();
        user.updateVelocity();

        ai.updateVelocity();
        const aiTarget = ball.y + (aiError ? (Math.random() - 0.5) * aiError : 0);
        if (ball.vx > 0) {
          if (ai.centerY < aiTarget - aiDeadzone) ai.y += Math.min(aiSpeed, aiTarget - ai.centerY);
          else if (ai.centerY > aiTarget + aiDeadzone) ai.y -= Math.min(aiSpeed, ai.centerY - aiTarget);
        } else {
          if (ai.centerY < H / 2) ai.y += 2;
          else if (ai.centerY > H / 2) ai.y -= 2;
        }
        ai.clamp();
      } else if (netMode === 'host') {
        user.centerY = mouseY;
        user.clamp();
        user.updateVelocity();

        // Smooth opponent (guest) paddle toward reported centerY to absorb jitter.
        const targetTopY = net.remotePaddleY - ai.h / 2;
        ai.y += (targetTopY - ai.y) * 0.5;
        ai.clamp();
        ai.updateVelocity();
      } else if (netMode === 'guest') {
        // Guest controls the RIGHT paddle (ai entity). Client-side prediction
        // of own paddle — host-authoritative physics decides hits.
        // user.y is owned by the snapshot; we only refresh vy for render.
        ai.centerY = mouseY;
        ai.clamp();
        ai.updateVelocity();
        user.updateVelocity();
      }

      // --- Physics / collisions / scoring (skipped on guest; guarded by winner==null) ---
      if (netMode !== 'guest' && winner == null) {
        ball.update();
        powerup.update();

        // Ball-Paddle collisions
        if (rectCollide(ball.x, ball.y, ball.radius, user.x, user.y, user.w, user.h) && ball.vx < 0) {
          ball.vx *= -1.05;
          ball.vy += ((ball.y - user.centerY) / (user.h / 2)) * 6;
          ball.spin = user.vy * 0.4;
          ball.x = user.x + user.w + ball.radius;
          ball.lastHit = 'user';
          spawnParticles(ball.x, ball.y, user.color);
          if (netMode === 'host') net.pendingEvents.push({ t: 'h', kind: 'paddle', x: ball.x, y: ball.y, who: 'user' });
        }
        if (rectCollide(ball.x, ball.y, ball.radius, ai.x, ai.y, ai.w, ai.h) && ball.vx > 0) {
          ball.vx *= -1.05;
          ball.vy += ((ball.y - ai.centerY) / (ai.h / 2)) * 6;
          ball.spin = ai.vy * 0.4;
          ball.x = ai.x - ball.radius;
          ball.lastHit = 'ai';
          spawnParticles(ball.x, ball.y, ai.color);
          if (netMode === 'host') net.pendingEvents.push({ t: 'h', kind: 'paddle', x: ball.x, y: ball.y, who: 'ai' });
        }

        // PowerUp collision
        if (powerup.active) {
          const dist = Math.sqrt((ball.x - powerup.x) ** 2 + (ball.y - powerup.y) ** 2);
          if (dist < ball.radius + powerup.radius) {
            powerup.active = false;
            spawnParticles(powerup.x, powerup.y, POWERUP_COLOR);
            if (ball.lastHit === 'user') user.activatePowerup();
            else if (ball.lastHit === 'ai') ai.activatePowerup();
            if (netMode === 'host') net.pendingEvents.push({ t: 'h', kind: 'powerup', x: powerup.x, y: powerup.y, who: ball.lastHit || 'user' });
          }
        }

        // Scoring
        if (ball.x < 0) {
          scoreAI++;
          if (scoreAI >= winScore) { gameState = 'gameover'; winner = 'ai'; canvas.style.cursor = 'default'; }
          else ball.reset();
        }
        if (ball.x > W) {
          scoreUser++;
          if (scoreUser >= winScore) { gameState = 'gameover'; winner = 'user'; canvas.style.cursor = 'default'; }
          else ball.reset();
        }
      }

      // Particles run for all modes so hit-event juice appears on guest too.
      particles.forEach(p => p.update());
      particles = particles.filter(p => p.life > 0 && p.radius > 0);

      // --- Network send ---
      // Throttle: 30Hz during play, ~2Hz on gameover (heartbeat for guest's
      // reverse transition + keeps lastRx fresh for peer heartbeats).
      if (netMode === 'host' && (gameState === 'playing' || gameState === 'gameover')) {
        net.sendTick++;
        const period = gameState === 'playing' ? 2 : 30;
        if (net.sendTick % period === 0) netSendSnapshot();
      } else if (netMode === 'guest' && gameState === 'playing') {
        netSendInput();
      } else if (netMode === 'guest' && gameState === 'gameover') {
        // ~2Hz heartbeat so host's watchdog doesn't kill the rematch flow.
        net.sendTick++;
        if (net.sendTick % 30 === 0) netSafeSend({ t: 'i', y: ai.centerY, ts: Date.now() });
      }

      // --- Drawing ---
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Table surface with radial gradient for depth & lighting
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = 30;
      ctx.shadowOffsetY = 6;
      const tableGrad = ctx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, 520);
      tableGrad.addColorStop(0, '#1fa84e');
      tableGrad.addColorStop(0.6, '#18793a');
      tableGrad.addColorStop(1, '#115a2a');
      ctx.fillStyle = tableGrad;
      ctx.fillRect(40, 50, W - 80, H - 100);
      ctx.restore();

      // Subtle surface texture (faint noise lines)
      ctx.save();
      ctx.globalAlpha = 0.03;
      for (let ly = 55; ly < H - 50; ly += 6) {
        ctx.beginPath();
        ctx.moveTo(42, ly);
        ctx.lineTo(W - 42, ly);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // Table border — outer frame with bevel
      ctx.strokeStyle = '#d4d0b8';
      ctx.lineWidth = 3.5;
      ctx.strokeRect(40, 50, W - 80, H - 100);
      // Inner bevel highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      ctx.strokeRect(42, 52, W - 84, H - 104);

      // White court boundary line
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(56, 62, W - 112, H - 124);

      // Center net
      ctx.save();
      const netX = W / 2;
      // Net posts (small metallic rectangles)
      const postGrad = ctx.createLinearGradient(netX - 3, 0, netX + 3, 0);
      postGrad.addColorStop(0, '#c0c0c0');
      postGrad.addColorStop(0.5, '#e8e8e8');
      postGrad.addColorStop(1, '#909090');
      ctx.fillStyle = postGrad;
      ctx.fillRect(netX - 3, 43, 6, 11);
      ctx.fillRect(netX - 3, H - 54, 6, 11);
      // Net cord (top white line)
      ctx.beginPath();
      ctx.moveTo(netX, 50);
      ctx.lineTo(netX, H - 50);
      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Net mesh horizontal lines
      ctx.strokeStyle = 'rgba(200,200,200,0.12)';
      ctx.lineWidth = 0.7;
      for (let ny = 58; ny < H - 50; ny += 10) {
        ctx.beginPath();
        ctx.moveTo(netX - 7, ny);
        ctx.lineTo(netX + 7, ny);
        ctx.stroke();
      }
      ctx.restore();

      // Score display
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      // Score numbers with subtle text shadow
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4;
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.font = '60px Impact, Arial Black, sans-serif';
      ctx.fillText(`${scoreUser}     ${scoreAI}`, W / 2, 8);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      // Player labels (mode-aware). In online modes, brighten the local
      // player's label and tint it with their chosen palette color so
      // identity is unambiguous even mid-rally.
      ctx.font = 'bold 12px sans-serif';
      ctx.letterSpacing = '2px';
      const leftLabel  = netMode === 'guest' ? 'OPP' : 'YOU';
      const rightLabel = netMode === 'local' ? 'AI'  : (netMode === 'guest' ? 'YOU' : 'OPP');
      const leftIsMe  = netMode === 'host';
      const rightIsMe = netMode === 'guest';
      ctx.fillStyle = leftIsMe ? net.myColor : 'rgba(220,50,50,0.4)';
      ctx.textAlign = 'left';
      ctx.fillText(leftLabel, 52, 34);
      ctx.fillStyle = rightIsMe ? net.myColor : 'rgba(50,100,220,0.4)';
      ctx.textAlign = 'right';
      ctx.fillText(rightLabel, W - 52, 34);
      ctx.textAlign = 'center';
      ctx.restore();

      powerup.draw();
      user.draw();
      ai.draw();
      ball.draw();
      particles.forEach(p => p.draw());

      // YOU marker: persistent chevron + label over the local player's paddle
      // in online modes. Explicit cue > clever — no fading, no animation.
      if (netMode !== 'local') {
        const me = netMode === 'host' ? user : ai;
        const cx = me.x + me.w / 2;
        // Clamp so marker stays on canvas even when paddle is near top edge.
        const cy = Math.max(me.y - 22, 18);
        ctx.save();
        ctx.fillStyle = me.color;
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx - 7, cy);
        ctx.lineTo(cx + 7, cy);
        ctx.lineTo(cx, cy + 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText('YOU', cx, cy - 2);
        ctx.restore();
      }

      if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);

        const isDisconnect = winner === 'disconnect';
        // Perspective-aware win check: guest's "user" paddle is on the right (scoreAI).
        const isWin = !isDisconnect && (
          (winner === 'user' && (netMode === 'local' || netMode === 'host')) ||
          (winner === 'ai'   && netMode === 'guest')
        );

        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title with glow
        let titleText, titleColor;
        if (isDisconnect) { titleText = 'OPPONENT LEFT'; titleColor = '#ffb432'; }
        else if (isWin)   { titleText = 'YOU WIN!';      titleColor = '#00e5a0'; }
        else              { titleText = 'YOU LOSE';      titleColor = '#ff4444'; }

        ctx.shadowColor = titleColor;
        ctx.shadowBlur = 30;
        ctx.font = 'bold 80px Impact, Arial Black, sans-serif';
        ctx.fillStyle = titleColor;
        ctx.fillText(titleText, W / 2, H / 2 - 80);
        ctx.shadowBlur = 0;

        if (!isDisconnect) {
          ctx.font = '36px Impact, Arial Black, sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.fillText(`${scoreUser}  —  ${scoreAI}`, W / 2, H / 2 - 10);
        }

        // Rebuild buttons each frame so hit-test stays in sync with render.
        gameoverButtons = [];
        const isOnline = (netMode === 'host' || netMode === 'guest') && !isDisconnect;

        if (isOnline) {
          // REMATCH button (label flips to WAITING… after we've sent 'rm').
          const rw = 240, rh = 56, ry = H / 2 + 45;
          const rx = W / 2 - rw / 2;
          const rematchLabel = net.rematchMe ? (net.rematchPeer ? 'STARTING…' : 'WAITING…') : 'REMATCH';
          const rematchFill  = net.rematchMe ? '#6c9' : '#00e5a0';
          ctx.fillStyle = rematchFill;
          roundRect(rx, ry, rw, rh, 10);
          ctx.fillStyle = '#000';
          ctx.font = 'bold 24px Impact, Arial Black, sans-serif';
          ctx.fillText(rematchLabel, W / 2, ry + rh / 2);
          if (!net.rematchMe) {
            gameoverButtons.push({
              x: rx, y: ry, w: rw, h: rh,
              action: () => {
                net.rematchMe = true;
                netSafeSend({ t: 'rm' });
              }
            });
          }

          // MAIN MENU button
          const mw = 240, mh = 48, my = ry + rh + 16;
          const mx = W / 2 - mw / 2;
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          roundRect(mx, my, mw, mh, 10);
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 2;
          ctx.strokeRect(mx, my, mw, mh);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px Impact, Arial Black, sans-serif';
          ctx.fillText('MAIN MENU', W / 2, my + mh / 2);
          gameoverButtons.push({
            x: mx, y: my, w: mw, h: mh,
            action: () => {
              try { netSafeSend({ t: 'bye' }); } catch {}
              showMenu();
            }
          });
        } else {
          ctx.font = '17px sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fillText('Tap or press Enter to go back to menu', W / 2, H / 2 + 70);
        }
        ctx.restore();

        // Keep the loop alive during gameover ONLY in online modes so the
        // rematch trigger, button label updates, and reverse 'playing'
        // transition can run. Local mode gets a static frame (pre-v2 behavior).
        if (netMode === 'host' || netMode === 'guest') requestAnimationFrame(gameLoop);
        return;
      }

      requestAnimationFrame(gameLoop);
    }

    // --- State transitions ---
    function startGame(mode) {
      netMode = mode || 'local';
      gameState = 'playing';
      canvas.style.cursor = 'none';
      scoreUser = 0; scoreAI = 0;
      winner = null;
      particles = [];
      powerup.reset();
      user.h = user.baseHeight; user.powerTimer = 0; user.y = H / 2 - 50;
      ai.h = ai.baseHeight;   ai.powerTimer = 0;   ai.y = H / 2 - 50;
      mouseY = H / 2;
      // Apply paddle colors based on role. Opponent color may still be null
      // until the 'hi' handshake lands; applyColors() is re-run on receipt.
      net.rematchMe = false;
      net.rematchPeer = false;
      if (netMode !== 'local') applyColors();
      else { user.color = '#dc3232'; ai.color = '#3264dc'; }
      // Guest waits for the first host snapshot to populate ball state.
      if (netMode === 'guest') {
        ball.vx = 0; ball.vy = 0; ball.spin = 0;
        ball.x = W / 2; ball.y = H / 2;
        ball.trail = []; ball.lastHit = null;
        net.lastAppliedFrame = -1;
      } else {
        ball.reset();
      }
      // Host primes lastRx so the stale watchdog grace-periods the first handshake.
      if (netMode === 'host') net.lastRx = Date.now();
      requestAnimationFrame(gameLoop);
    }

    function showMenu() {
      // Clean up any half-open connection when returning to menu.
      netTeardown();
      netMode = 'local';
      menuScreen = 'main';
      joinCodeInput = '';
      blurJoinInput();
      gameState = 'menu';
      winner = null;
      canvas.style.cursor = 'default';
      requestAnimationFrame(menuLoop);
    }

    showMenu();
  </script>
</body>
</html>
