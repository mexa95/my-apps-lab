<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Tennis: Power-Up Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #14181c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Impact', 'Arial Black', sans-serif;
      cursor: none;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      body { cursor: default; }
      #mobile-hint { display: block; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="mobile-hint">Touch &amp; drag to move paddle</div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = 1000, H = 600;
    canvas.width = W;
    canvas.height = H;

    // Scale for responsiveness
    function resize() {
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // Mouse / touch tracking
    let mouseY = H / 2;
    function getCanvasY(clientY) {
      const rect = canvas.getBoundingClientRect();
      return ((clientY - rect.top) / rect.height) * H;
    }
    canvas.addEventListener('mousemove', e => { mouseY = getCanvasY(e.clientY); });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      mouseY = getCanvasY(e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      mouseY = getCanvasY(e.touches[0].clientY);
    }, { passive: false });

    // Colors
    const BG = '#14181c';
    const TABLE = '#196e37';
    const BALL_COLOR = '#ffb432';
    const POWERUP_COLOR = '#ffd700';

    // --- Classes ---
    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.radius = 2 + Math.random() * 3;
        this.color = color;
        this.life = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.06;
        this.radius -= 0.1;
      }
      draw() {
        if (this.life <= 0 || this.radius <= 0) return;
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0, this.radius), 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    class PowerUp {
      constructor() {
        this.x = 0; this.y = 0;
        this.radius = 15;
        this.active = false;
        this.spawnTimer = 0;
        this.pulse = 0;
      }
      update() {
        if (!this.active) {
          this.spawnTimer++;
          if (this.spawnTimer > 300) {
            this.active = true;
            this.x = W / 4 + Math.random() * (W / 2);
            this.y = 100 + Math.random() * (H - 200);
            this.spawnTimer = 0;
          }
        } else {
          this.pulse += 0.1;
        }
      }
      draw() {
        if (!this.active) return;
        const glowR = this.radius + Math.abs(Math.sin(this.pulse * 2.5)) * 5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(150,150,50,0.6)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = POWERUP_COLOR;
        ctx.fill();
        // Star icon
        ctx.fillStyle = '#a08000';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', this.x, this.y + 1);
      }
    }

    class Paddle {
      constructor(x, color) {
        this.baseHeight = 100;
        this.x = x;
        this.y = H / 2 - 50;
        this.w = 15;
        this.h = this.baseHeight;
        this.color = color;
        this.vy = 0;
        this.lastY = this.y;
        this.powerTimer = 0;
      }
      get centerY() { return this.y + this.h / 2; }
      set centerY(v) { this.y = v - this.h / 2; }
      updateVelocity() {
        this.vy = this.y - this.lastY;
        this.lastY = this.y;
        if (this.powerTimer > 0) {
          this.powerTimer--;
          if (this.powerTimer <= 0) this.h = this.baseHeight;
        }
      }
      activatePowerup() {
        this.h = 200;
        this.powerTimer = 600;
      }
      clamp() {
        const minY = 50;
        const maxY = H - 50 - this.h;
        this.y = Math.max(minY, Math.min(this.y, maxY));
      }
      draw() {
        // Shadow
        ctx.fillStyle = 'rgba(10,40,20,0.7)';
        ctx.fillRect(this.x + 6, this.y + 6, this.w, this.h);
        // Glow if powered up
        if (this.powerTimer > 0) {
          ctx.strokeStyle = POWERUP_COLOR;
          ctx.lineWidth = 2;
          ctx.strokeRect(this.x - 2, this.y - 2, this.w + 4, this.h + 4);
        }
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
      }
    }

    class Ball {
      constructor() {
        this.radius = 8;
        this.trail = [];
        this.reset();
      }
      reset() {
        this.x = W / 2;
        this.y = H / 2;
        this.vx = (Math.random() < 0.5 ? -1 : 1) * 8;
        this.vy = (Math.random() - 0.5) * 6;
        this.spin = 0;
        this.trail = [];
        this.lastHit = null;
      }
      update() {
        this.vy += this.spin * 0.05;
        this.spin *= 0.98;
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > 22) {
          this.vx = (this.vx / speed) * 22;
          this.vy = (this.vy / speed) * 22;
        }
        this.x += this.vx;
        this.y += this.vy;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 10) this.trail.shift();
        if (this.y <= 50 || this.y >= H - 50) {
          this.vy *= -1;
          this.spin *= 0.6;
          this.y = Math.max(50, Math.min(this.y, H - 50));
        }
      }
      draw() {
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const size = Math.max(1, this.radius * (i / 10));
          const c = Math.max(0, 255 - (10 - i) * 20);
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgb(${c},${Math.floor(c * 0.5)},0)`;
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = BALL_COLOR;
        ctx.fill();
      }
    }

    // --- Setup ---
    const user = new Paddle(50, '#dc3232');
    const ai = new Paddle(W - 65, '#3264dc');
    const ball = new Ball();
    const powerup = new PowerUp();
    let particles = [];
    let scoreUser = 0, scoreAI = 0;

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, color));
    }

    function rectCollide(bx, by, br, rx, ry, rw, rh) {
      return bx + br > rx && bx - br < rx + rw && by + br > ry && by - br < ry + rh;
    }

    // --- Game Loop ---
    function gameLoop() {
      // User control
      user.centerY = mouseY;
      user.clamp();
      user.updateVelocity();

      // AI
      ai.updateVelocity();
      if (ball.vx > 0) {
        const target = ball.y;
        if (ai.centerY < target - 15) {
          ai.y += Math.min(7, target - ai.centerY);
        } else if (ai.centerY > target + 15) {
          ai.y -= Math.min(7, ai.centerY - target);
        }
      } else {
        if (ai.centerY < H / 2) ai.y += 2;
        else if (ai.centerY > H / 2) ai.y -= 2;
      }
      ai.clamp();

      ball.update();
      powerup.update();

      // Update particles
      particles.forEach(p => p.update());
      particles = particles.filter(p => p.life > 0 && p.radius > 0);

      // Ball-Paddle collisions
      if (rectCollide(ball.x, ball.y, ball.radius, user.x, user.y, user.w, user.h) && ball.vx < 0) {
        ball.vx *= -1.05;
        ball.vy += ((ball.y - user.centerY) / (user.h / 2)) * 6;
        ball.spin = user.vy * 0.4;
        ball.x = user.x + user.w + ball.radius;
        ball.lastHit = 'user';
        spawnParticles(ball.x, ball.y, user.color);
      }
      if (rectCollide(ball.x, ball.y, ball.radius, ai.x, ai.y, ai.w, ai.h) && ball.vx > 0) {
        ball.vx *= -1.05;
        ball.vy += ((ball.y - ai.centerY) / (ai.h / 2)) * 6;
        ball.spin = ai.vy * 0.4;
        ball.x = ai.x - ball.radius;
        ball.lastHit = 'ai';
        spawnParticles(ball.x, ball.y, ai.color);
      }

      // PowerUp collision
      if (powerup.active) {
        const dist = Math.sqrt((ball.x - powerup.x) ** 2 + (ball.y - powerup.y) ** 2);
        if (dist < ball.radius + powerup.radius) {
          powerup.active = false;
          spawnParticles(powerup.x, powerup.y, POWERUP_COLOR);
          if (ball.lastHit === 'user') user.activatePowerup();
          else if (ball.lastHit === 'ai') ai.activatePowerup();
        }
      }

      // Scoring
      if (ball.x < 0) { scoreAI++; ball.reset(); }
      if (ball.x > W) { scoreUser++; ball.reset(); }

      // --- Drawing ---
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Table
      ctx.fillStyle = TABLE;
      ctx.fillRect(40, 50, W - 80, H - 100);
      ctx.strokeStyle = '#c8c8c8';
      ctx.lineWidth = 4;
      ctx.strokeRect(40, 50, W - 80, H - 100);

      // Center line
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 50);
      ctx.lineTo(W / 2, H - 50);
      ctx.strokeStyle = 'rgba(200,200,200,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);

      // Score
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#fff';
      ctx.font = '60px Impact, Arial Black, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`${scoreUser}     ${scoreAI}`, W / 2, 8);
      ctx.globalAlpha = 1;

      // Labels
      ctx.font = '14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'left';
      ctx.fillText('YOU', 52, 32);
      ctx.textAlign = 'right';
      ctx.fillText('AI', W - 52, 32);
      ctx.textAlign = 'center';

      powerup.draw();
      user.draw();
      ai.draw();
      ball.draw();
      particles.forEach(p => p.draw());

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
