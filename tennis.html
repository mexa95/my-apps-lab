<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Tennis: Power-Up Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #14181c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Impact', 'Arial Black', sans-serif;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      body { cursor: default; }
      #mobile-hint { display: block; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="mobile-hint">Touch &amp; drag to move paddle</div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const W = 1000, H = 600;
    canvas.width = W;
    canvas.height = H;

    // Scale for responsiveness
    function resize() {
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let gameState = 'menu'; // 'menu' | 'playing' | 'gameover'
    let difficulty = 'medium';
    let winScore = 5;
    let winner = null;

    // Input
    let mouseY = H / 2;
    function getCanvasPos(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((clientX - rect.left) / rect.width) * W,
        y: ((clientY - rect.top) / rect.height) * H
      };
    }
    document.addEventListener('mousemove', e => {
      const pos = getCanvasPos(e.clientX, e.clientY);
      if (gameState === 'playing') {
        mouseY = pos.y;
      } else if (gameState === 'menu') {
        const over = menuButtons.some(b => pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h);
        canvas.style.cursor = over ? 'pointer' : 'default';
      }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === 'menu') startGame();
        else if (gameState === 'gameover') showMenu();
      }
    });

    // Colors
    const BG = '#14181c';
    const TABLE = '#196e37';
    const BALL_COLOR = '#ffb432';
    const POWERUP_COLOR = '#ffd700';

    // --- Classes ---
    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.radius = 2 + Math.random() * 3;
        this.color = color;
        this.life = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.06;
        this.radius -= 0.1;
      }
      draw() {
        if (this.life <= 0 || this.radius <= 0) return;
        const r = Math.max(0.5, this.radius);
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        // Soft glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    class PowerUp {
      constructor() {
        this.x = 0; this.y = 0;
        this.radius = 15;
        this.active = false;
        this.spawnTimer = 0;
        this.pulse = 0;
      }
      update() {
        if (!this.active) {
          this.spawnTimer++;
          if (this.spawnTimer > 300) {
            this.active = true;
            this.x = W / 4 + Math.random() * (W / 2);
            this.y = 100 + Math.random() * (H - 200);
            this.spawnTimer = 0;
          }
        } else {
          this.pulse += 0.1;
        }
      }
      reset() { this.active = false; this.spawnTimer = 0; this.pulse = 0; }
      draw() {
        if (!this.active) return;
        ctx.save();
        const glowR = this.radius + Math.abs(Math.sin(this.pulse * 2.5)) * 6;
        // Outer glow halo
        const outerGlow = ctx.createRadialGradient(this.x, this.y, this.radius * 0.5, this.x, this.y, glowR + 8);
        outerGlow.addColorStop(0, 'rgba(255,215,0,0.5)');
        outerGlow.addColorStop(0.6, 'rgba(255,215,0,0.15)');
        outerGlow.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowR + 8, 0, Math.PI * 2);
        ctx.fillStyle = outerGlow;
        ctx.fill();
        // Main orb with gradient
        const orbGrad = ctx.createRadialGradient(
          this.x - 3, this.y - 3, 1,
          this.x, this.y, this.radius
        );
        orbGrad.addColorStop(0, '#fff8dc');
        orbGrad.addColorStop(0.4, '#ffe44d');
        orbGrad.addColorStop(1, '#cca000');
        ctx.shadowColor = POWERUP_COLOR;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = orbGrad;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Star icon
        ctx.fillStyle = 'rgba(120,80,0,0.8)';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', this.x, this.y + 1);
        ctx.restore();
      }
    }

    class Paddle {
      constructor(x, color) {
        this.baseHeight = 100;
        this.x = x;
        this.y = H / 2 - 50;
        this.w = 16;
        this.h = this.baseHeight;
        this.color = color;
        this.vy = 0;
        this.lastY = this.y;
        this.powerTimer = 0;
      }
      get centerY() { return this.y + this.h / 2; }
      set centerY(v) { this.y = v - this.h / 2; }
      updateVelocity() {
        this.vy = this.y - this.lastY;
        this.lastY = this.y;
        if (this.powerTimer > 0) {
          this.powerTimer--;
          if (this.powerTimer <= 0) this.h = this.baseHeight;
        }
      }
      activatePowerup() {
        this.h = 200;
        this.powerTimer = 600;
      }
      clamp() {
        const minY = 50;
        const maxY = H - 50 - this.h;
        this.y = Math.max(minY, Math.min(this.y, maxY));
      }
      draw() {
        const r = 5;
        ctx.save();
        // Drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;
        // Main paddle body
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = this.color;
        ctx.fill();
        // Clear shadow for overlays
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        // 3D gradient overlay (light left edge, dark right edge)
        const shadeGrad = ctx.createLinearGradient(this.x, 0, this.x + this.w, 0);
        shadeGrad.addColorStop(0, 'rgba(255,255,255,0.28)');
        shadeGrad.addColorStop(0.45, 'rgba(255,255,255,0.06)');
        shadeGrad.addColorStop(1, 'rgba(0,0,0,0.22)');
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = shadeGrad;
        ctx.fill();
        // Top-to-bottom subtle shading
        const vGrad = ctx.createLinearGradient(0, this.y, 0, this.y + this.h);
        vGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
        vGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
        vGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, r);
        ctx.fillStyle = vGrad;
        ctx.fill();
        // Edge highlight
        ctx.beginPath();
        ctx.roundRect(this.x + 0.5, this.y + 0.5, this.w - 1, this.h - 1, r);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Power-up glow
        if (this.powerTimer > 0) {
          ctx.shadowColor = POWERUP_COLOR;
          ctx.shadowBlur = 22;
          ctx.beginPath();
          ctx.roundRect(this.x - 3, this.y - 3, this.w + 6, this.h + 6, r + 3);
          ctx.strokeStyle = POWERUP_COLOR;
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        ctx.restore();
      }
    }

    class Ball {
      constructor() {
        this.radius = 10;
        this.trail = [];
        this.reset();
      }
      reset() {
        this.x = W / 2;
        this.y = H / 2;
        this.vx = (Math.random() < 0.5 ? -1 : 1) * 8;
        this.vy = (Math.random() - 0.5) * 6;
        this.spin = 0;
        this.trail = [];
        this.lastHit = null;
      }
      update() {
        this.vy += this.spin * 0.05;
        this.spin *= 0.98;
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > 22) {
          this.vx = (this.vx / speed) * 22;
          this.vy = (this.vy / speed) * 22;
        }
        this.x += this.vx;
        this.y += this.vy;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 10) this.trail.shift();
        if (this.y <= 50 || this.y >= H - 50) {
          this.vy *= -1;
          this.spin *= 0.6;
          this.y = Math.max(50, Math.min(this.y, H - 50));
        }
      }
      draw() {
        // Shadow on the court surface
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(this.x + 3, this.y + 3, this.radius * 1.1, this.radius * 0.55, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fill();
        // Motion trail with soft glow
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const progress = i / this.trail.length;
          const size = this.radius * progress * 0.85;
          if (size < 0.5) continue;
          const alpha = progress * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,180,50,${alpha})`;
          ctx.fill();
        }
        // Main ball with radial gradient for 3D sphere look
        const grad = ctx.createRadialGradient(
          this.x - this.radius * 0.3, this.y - this.radius * 0.35, this.radius * 0.08,
          this.x, this.y, this.radius
        );
        grad.addColorStop(0, '#ffe8a0');
        grad.addColorStop(0.35, '#ffcc44');
        grad.addColorStop(0.7, BALL_COLOR);
        grad.addColorStop(1, '#b87800');
        ctx.shadowColor = 'rgba(255,180,50,0.4)';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Crisp edge ring
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(160,100,0,0.35)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // Specular highlight
        ctx.beginPath();
        ctx.arc(this.x - this.radius * 0.25, this.y - this.radius * 0.3, this.radius * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
        ctx.restore();
      }
    }

    // --- Setup ---
    const user = new Paddle(50, '#dc3232');
    const ai   = new Paddle(W - 65, '#3264dc');
    const ball = new Ball();
    const powerup = new PowerUp();
    let particles = [];
    let scoreUser = 0, scoreAI = 0;

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, color));
    }
    function rectCollide(bx, by, br, rx, ry, rw, rh) {
      return bx + br > rx && bx - br < rx + rw && by + br > ry && by - br < ry + rh;
    }

    // --- Menu ---
    let menuButtons = [];
    let menuPulse = 0;

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function handleTap(clientX, clientY) {
      const pos = getCanvasPos(clientX, clientY);
      if (gameState === 'menu') {
        for (const btn of menuButtons) {
          if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
            btn.action();
            break;
          }
        }
      } else if (gameState === 'gameover') {
        showMenu();
      }
    }

    function drawMenu() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);
      // Faint table background
      ctx.fillStyle = 'rgba(25,110,55,0.12)';
      ctx.fillRect(40, 50, W - 80, H - 100);

      menuButtons = [];
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Title
      ctx.font = 'bold 72px Impact, Arial Black, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('TABLE TENNIS', W / 2, 110);

      ctx.font = '22px sans-serif';
      ctx.fillStyle = POWERUP_COLOR;
      ctx.fillText('⚡ Power-Up Edition', W / 2, 155);

      // Difficulty
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('DIFFICULTY', W / 2, 218);

      const diffs = [
        { key: 'easy',   label: 'Easy',   color: '#00e5a0' },
        { key: 'medium', label: 'Medium', color: POWERUP_COLOR },
        { key: 'hard',   label: 'Hard',   color: '#dc3232' },
      ];
      const bw = 160, bh = 52, gap = 20;
      const totalBW = diffs.length * bw + (diffs.length - 1) * gap;
      diffs.forEach((d, i) => {
        const x = W / 2 - totalBW / 2 + i * (bw + gap);
        const y = 234;
        const sel = difficulty === d.key;
        ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.08)';
        roundRect(x, y, bw, bh, 8);
        ctx.fillStyle = sel ? '#000' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}18px sans-serif`;
        ctx.fillText(d.label, x + bw / 2, y + bh / 2);
        menuButtons.push({ x, y, w: bw, h: bh, action: () => { difficulty = d.key; } });
      });

      // Score limit
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('FIRST TO', W / 2, 336);

      const scores = [5, 7, 10];
      const sbw = 120, sbh = 52, sgap = 24;
      const totalSW = scores.length * sbw + (scores.length - 1) * sgap;
      scores.forEach((s, i) => {
        const x = W / 2 - totalSW / 2 + i * (sbw + sgap);
        const y = 352;
        const sel = winScore === s;
        ctx.fillStyle = sel ? '#3264dc' : 'rgba(255,255,255,0.08)';
        roundRect(x, y, sbw, sbh, 8);
        ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}28px Impact, sans-serif`;
        ctx.fillText(s, x + sbw / 2, y + sbh / 2 + 1);
        menuButtons.push({ x, y, w: sbw, h: sbh, action: () => { winScore = s; } });
      });

      // Play button (pulsing)
      const pw = 240, ph = 64;
      const px = W / 2 - pw / 2, py = 458;
      const pulse = 1 + 0.04 * Math.sin(menuPulse * 3);
      ctx.save();
      ctx.translate(W / 2, py + ph / 2);
      ctx.scale(pulse, pulse);
      ctx.translate(-W / 2, -(py + ph / 2));
      ctx.fillStyle = '#00e5a0';
      roundRect(px, py, pw, ph, 12);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 26px Impact, Arial Black, sans-serif';
      ctx.fillText('▶  PLAY', W / 2, py + ph / 2 + 1);
      ctx.restore();
      menuButtons.push({ x: px - 12, y: py - 12, w: pw + 24, h: ph + 24, action: startGame });
    }

    function menuLoop() {
      if (gameState !== 'menu') return;
      menuPulse += 0.03;
      drawMenu();
      requestAnimationFrame(menuLoop);
    }

    // --- Game Loop ---
    function gameLoop() {
      if (gameState !== 'playing') return;

      const aiSpeed    = { easy: 3.5, medium: 6,   hard: 9.5 }[difficulty];
      const aiDeadzone = { easy: 35,  medium: 15,  hard: 4   }[difficulty];
      const aiError    = { easy: 70,  medium: 0,   hard: 0   }[difficulty];

      // User control
      user.centerY = mouseY;
      user.clamp();
      user.updateVelocity();

      // AI
      ai.updateVelocity();
      const aiTarget = ball.y + (aiError ? (Math.random() - 0.5) * aiError : 0);
      if (ball.vx > 0) {
        if (ai.centerY < aiTarget - aiDeadzone) ai.y += Math.min(aiSpeed, aiTarget - ai.centerY);
        else if (ai.centerY > aiTarget + aiDeadzone) ai.y -= Math.min(aiSpeed, ai.centerY - aiTarget);
      } else {
        if (ai.centerY < H / 2) ai.y += 2;
        else if (ai.centerY > H / 2) ai.y -= 2;
      }
      ai.clamp();

      ball.update();
      powerup.update();
      particles.forEach(p => p.update());
      particles = particles.filter(p => p.life > 0 && p.radius > 0);

      // Ball-Paddle collisions
      if (rectCollide(ball.x, ball.y, ball.radius, user.x, user.y, user.w, user.h) && ball.vx < 0) {
        ball.vx *= -1.05;
        ball.vy += ((ball.y - user.centerY) / (user.h / 2)) * 6;
        ball.spin = user.vy * 0.4;
        ball.x = user.x + user.w + ball.radius;
        ball.lastHit = 'user';
        spawnParticles(ball.x, ball.y, user.color);
      }
      if (rectCollide(ball.x, ball.y, ball.radius, ai.x, ai.y, ai.w, ai.h) && ball.vx > 0) {
        ball.vx *= -1.05;
        ball.vy += ((ball.y - ai.centerY) / (ai.h / 2)) * 6;
        ball.spin = ai.vy * 0.4;
        ball.x = ai.x - ball.radius;
        ball.lastHit = 'ai';
        spawnParticles(ball.x, ball.y, ai.color);
      }

      // PowerUp collision
      if (powerup.active) {
        const dist = Math.sqrt((ball.x - powerup.x) ** 2 + (ball.y - powerup.y) ** 2);
        if (dist < ball.radius + powerup.radius) {
          powerup.active = false;
          spawnParticles(powerup.x, powerup.y, POWERUP_COLOR);
          if (ball.lastHit === 'user') user.activatePowerup();
          else if (ball.lastHit === 'ai') ai.activatePowerup();
        }
      }

      // Scoring
      if (ball.x < 0) {
        scoreAI++;
        if (scoreAI >= winScore) { gameState = 'gameover'; winner = 'ai'; canvas.style.cursor = 'default'; }
        else ball.reset();
      }
      if (ball.x > W) {
        scoreUser++;
        if (scoreUser >= winScore) { gameState = 'gameover'; winner = 'user'; canvas.style.cursor = 'default'; }
        else ball.reset();
      }

      // --- Drawing ---
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Table surface with radial gradient for depth & lighting
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = 30;
      ctx.shadowOffsetY = 6;
      const tableGrad = ctx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, 520);
      tableGrad.addColorStop(0, '#1fa84e');
      tableGrad.addColorStop(0.6, '#18793a');
      tableGrad.addColorStop(1, '#115a2a');
      ctx.fillStyle = tableGrad;
      ctx.fillRect(40, 50, W - 80, H - 100);
      ctx.restore();

      // Subtle surface texture (faint noise lines)
      ctx.save();
      ctx.globalAlpha = 0.03;
      for (let ly = 55; ly < H - 50; ly += 6) {
        ctx.beginPath();
        ctx.moveTo(42, ly);
        ctx.lineTo(W - 42, ly);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // Table border — outer frame with bevel
      ctx.strokeStyle = '#d4d0b8';
      ctx.lineWidth = 3.5;
      ctx.strokeRect(40, 50, W - 80, H - 100);
      // Inner bevel highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      ctx.strokeRect(42, 52, W - 84, H - 104);

      // White court boundary line
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(56, 62, W - 112, H - 124);

      // Center net
      ctx.save();
      const netX = W / 2;
      // Net posts (small metallic rectangles)
      const postGrad = ctx.createLinearGradient(netX - 3, 0, netX + 3, 0);
      postGrad.addColorStop(0, '#c0c0c0');
      postGrad.addColorStop(0.5, '#e8e8e8');
      postGrad.addColorStop(1, '#909090');
      ctx.fillStyle = postGrad;
      ctx.fillRect(netX - 3, 43, 6, 11);
      ctx.fillRect(netX - 3, H - 54, 6, 11);
      // Net cord (top white line)
      ctx.beginPath();
      ctx.moveTo(netX, 50);
      ctx.lineTo(netX, H - 50);
      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Net mesh horizontal lines
      ctx.strokeStyle = 'rgba(200,200,200,0.12)';
      ctx.lineWidth = 0.7;
      for (let ny = 58; ny < H - 50; ny += 10) {
        ctx.beginPath();
        ctx.moveTo(netX - 7, ny);
        ctx.lineTo(netX + 7, ny);
        ctx.stroke();
      }
      ctx.restore();

      // Score display
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      // Score numbers with subtle text shadow
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4;
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.font = '60px Impact, Arial Black, sans-serif';
      ctx.fillText(`${scoreUser}     ${scoreAI}`, W / 2, 8);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      // Player labels
      ctx.font = 'bold 12px sans-serif';
      ctx.letterSpacing = '2px';
      ctx.fillStyle = 'rgba(220,50,50,0.4)';
      ctx.textAlign = 'left';
      ctx.fillText('YOU', 52, 34);
      ctx.fillStyle = 'rgba(50,100,220,0.4)';
      ctx.textAlign = 'right';
      ctx.fillText('AI', W - 52, 34);
      ctx.textAlign = 'center';
      ctx.restore();

      powerup.draw();
      user.draw();
      ai.draw();
      ball.draw();
      particles.forEach(p => p.draw());

      if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);

        const isWin = winner === 'user';
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title with glow
        const winColor = isWin ? '#00e5a0' : '#ff4444';
        ctx.shadowColor = winColor;
        ctx.shadowBlur = 30;
        ctx.font = 'bold 80px Impact, Arial Black, sans-serif';
        ctx.fillStyle = winColor;
        ctx.fillText(isWin ? 'YOU WIN!' : 'YOU LOSE', W / 2, H / 2 - 60);
        ctx.shadowBlur = 0;

        ctx.font = '36px Impact, Arial Black, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(`${scoreUser}  —  ${scoreAI}`, W / 2, H / 2 + 10);

        ctx.font = '17px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText('Tap or press Enter to go back to menu', W / 2, H / 2 + 70);
        ctx.restore();
        return;
      }

      requestAnimationFrame(gameLoop);
    }

    // --- State transitions ---
    function startGame() {
      gameState = 'playing';
      canvas.style.cursor = 'none';
      scoreUser = 0; scoreAI = 0;
      winner = null;
      ball.reset();
      particles = [];
      powerup.reset();
      user.h = user.baseHeight; user.powerTimer = 0; user.y = H / 2 - 50;
      ai.h = ai.baseHeight;   ai.powerTimer = 0;   ai.y = H / 2 - 50;
      mouseY = H / 2;
      requestAnimationFrame(gameLoop);
    }

    function showMenu() {
      gameState = 'menu';
      canvas.style.cursor = 'default';
      requestAnimationFrame(menuLoop);
    }

    showMenu();
  </script>
</body>
</html>
