<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Tennis: Power-Up Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #14181c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Impact', 'Arial Black', sans-serif;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      body { cursor: default; }
      #mobile-hint { display: block; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="mobile-hint">Touch &amp; drag to move paddle</div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = 1000, H = 600;
    canvas.width = W;
    canvas.height = H;

    // Scale for responsiveness
    function resize() {
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let gameState = 'menu'; // 'menu' | 'playing' | 'gameover'
    let difficulty = 'medium';
    let winScore = 5;
    let winner = null;

    // Input
    let mouseY = H / 2;
    function getCanvasPos(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((clientX - rect.left) / rect.width) * W,
        y: ((clientY - rect.top) / rect.height) * H
      };
    }
    canvas.addEventListener('mousemove', e => {
      const pos = getCanvasPos(e.clientX, e.clientY);
      if (gameState === 'playing') {
        mouseY = pos.y;
      } else if (gameState === 'menu') {
        const over = menuButtons.some(b => pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h);
        canvas.style.cursor = over ? 'pointer' : 'default';
      }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (gameState === 'playing') mouseY = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY).y;
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === 'menu') startGame();
        else if (gameState === 'gameover') showMenu();
      }
    });

    // Colors
    const BG = '#14181c';
    const TABLE = '#196e37';
    const BALL_COLOR = '#ffb432';
    const POWERUP_COLOR = '#ffd700';
    const FIREBALL_COLOR = '#ff4500';

    // Physics constants
    const DRAG = 0.998;
    const MAX_SPEED = 24;
    const FIREBALL_MAX_SPEED = 28;

    // --- Classes ---
    class Particle {
      constructor(x, y, color, bvx, bvy) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8 + (bvx || 0) * 0.3;
        this.vy = (Math.random() - 0.5) * 8 + (bvy || 0) * 0.3;
        this.radius = 2 + Math.random() * 3;
        this.color = color;
        this.life = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.06;
        this.radius -= 0.1;
      }
      draw() {
        if (this.life <= 0 || this.radius <= 0) return;
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0, this.radius), 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    class PowerUp {
      constructor() {
        this.x = 0; this.y = 0;
        this.radius = 15;
        this.active = false;
        this.spawnTimer = 0;
        this.pulse = 0;
        this.type = 'expand';
      }
      update() {
        if (!this.active) {
          this.spawnTimer++;
          if (this.spawnTimer > 300) {
            this.active = true;
            this.x = W / 4 + Math.random() * (W / 2);
            this.y = 100 + Math.random() * (H - 200);
            this.type = Math.random() < 0.5 ? 'expand' : 'fireball';
            this.spawnTimer = 0;
          }
        } else {
          this.pulse += 0.1;
        }
      }
      reset() { this.active = false; this.spawnTimer = 0; this.pulse = 0; }
      draw() {
        if (!this.active) return;
        const isFireball = this.type === 'fireball';
        const color = isFireball ? FIREBALL_COLOR : POWERUP_COLOR;
        const glowColor = isFireball ? 'rgba(255,69,0,0.5)' : 'rgba(150,150,50,0.6)';
        const glowR = this.radius + Math.abs(Math.sin(this.pulse * 2.5)) * 5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glowColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        // Icon
        ctx.fillStyle = isFireball ? '#cc3300' : '#a08000';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isFireball ? '\u{1F525}' : '\u2605', this.x, this.y + 1);
      }
    }

    class Paddle {
      constructor(x, color) {
        this.baseHeight = 100;
        this.x = x;
        this.y = H / 2 - 50;
        this.w = 15;
        this.h = this.baseHeight;
        this.color = color;
        this.vy = 0;
        this.lastY = this.y;
        this.powerTimer = 0;
      }
      get centerY() { return this.y + this.h / 2; }
      set centerY(v) { this.y = v - this.h / 2; }
      updateVelocity() {
        this.vy = this.y - this.lastY;
        this.lastY = this.y;
        if (this.powerTimer > 0) {
          this.powerTimer--;
          if (this.powerTimer <= 0) this.h = this.baseHeight;
        }
      }
      activatePowerup() {
        this.h = 200;
        this.powerTimer = 600;
      }
      clamp() {
        const minY = 50;
        const maxY = H - 50 - this.h;
        this.y = Math.max(minY, Math.min(this.y, maxY));
      }
      draw() {
        // Shadow
        ctx.fillStyle = 'rgba(10,40,20,0.7)';
        ctx.fillRect(this.x + 6, this.y + 6, this.w, this.h);
        // Glow if powered up
        if (this.powerTimer > 0) {
          ctx.strokeStyle = POWERUP_COLOR;
          ctx.lineWidth = 2;
          ctx.strokeRect(this.x - 2, this.y - 2, this.w + 4, this.h + 4);
        }
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
      }
    }

    class Ball {
      constructor() {
        this.radius = 8;
        this.trail = [];
        this.fireball = false;
        this.fireballTimer = 0;
        this.reset();
      }
      reset() {
        this.x = W / 2;
        this.y = H / 2;
        this.vx = (Math.random() < 0.5 ? -1 : 1) * 8;
        this.vy = (Math.random() - 0.5) * 6;
        this.spin = 0;
        this.trail = [];
        this.lastHit = null;
        this.fireball = false;
        this.fireballTimer = 0;
      }
      activateFireball() {
        this.fireball = true;
        this.fireballTimer = 400;
        this.vx *= 1.3;
      }
      update() {
        // Air drag
        this.vx *= DRAG;
        this.vy *= DRAG;
        // Magnus effect — spin curves ball on both axes
        this.vx += this.spin * 0.02 * Math.sign(this.vx);
        this.vy += this.spin * 0.08;
        this.spin *= 0.985;
        // Speed cap
        const maxSpd = this.fireball ? FIREBALL_MAX_SPEED : MAX_SPEED;
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > maxSpd) {
          this.vx = (this.vx / speed) * maxSpd;
          this.vy = (this.vy / speed) * maxSpd;
        }
        // Minimum speed floor
        if (speed > 0 && speed < 4) {
          this.vx = (this.vx / speed) * 4;
          this.vy = (this.vy / speed) * 4;
        }
        this.x += this.vx;
        this.y += this.vy;
        const trailLen = this.fireball ? 15 : 10;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > trailLen) this.trail.shift();
        // Wall bounce
        if (this.y <= 50 || this.y >= H - 50) {
          this.vy *= -1;
          this.spin *= -0.5;
          this.y = Math.max(50, Math.min(this.y, H - 50));
        }
        // Fireball timer
        if (this.fireball) {
          this.fireballTimer--;
          if (this.fireballTimer <= 0) this.fireball = false;
        }
      }
      draw() {
        if (this.fireball) {
          // Fireball trail
          for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const pct = i / this.trail.length;
            const size = Math.max(1, this.radius * 1.5 * pct);
            const colors = ['#ff4500', '#ff6600', '#ffaa00', '#ffcc00'];
            const ci = Math.floor(pct * (colors.length - 1));
            ctx.globalAlpha = pct * 0.7;
            ctx.beginPath();
            ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
            ctx.fillStyle = colors[ci];
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          // Fireball glow
          const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2.5);
          grad.addColorStop(0, 'rgba(255,255,100,0.8)');
          grad.addColorStop(0.4, 'rgba(255,140,0,0.5)');
          grad.addColorStop(1, 'rgba(255,69,0,0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          // Fireball core
          const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
          coreGrad.addColorStop(0, '#fff8e0');
          coreGrad.addColorStop(0.5, '#ffcc00');
          coreGrad.addColorStop(1, '#ff4500');
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = coreGrad;
          ctx.fill();
          // Spawn ember particles
          if (Math.random() < 0.4) {
            particles.push(new Particle(
              this.x + (Math.random() - 0.5) * 6,
              this.y + (Math.random() - 0.5) * 6,
              ['#ff4500','#ff6600','#ffaa00'][Math.floor(Math.random() * 3)],
              -this.vx * 0.1, -2
            ));
          }
        } else {
          // Normal trail
          for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const size = Math.max(1, this.radius * (i / 10));
            const c = Math.max(0, 255 - (10 - i) * 20);
            ctx.beginPath();
            ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${c},${Math.floor(c * 0.5)},0)`;
            ctx.fill();
          }
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = BALL_COLOR;
          ctx.fill();
        }
        // Spin indicator
        if (Math.abs(this.spin) > 2) {
          const spinDir = Math.sign(this.spin);
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius + 4, -Math.PI * 0.3 * spinDir, Math.PI * 0.3 * spinDir);
          ctx.stroke();
          const endAngle = Math.PI * 0.3 * spinDir;
          const ax = this.x + (this.radius + 4) * Math.cos(endAngle);
          const ay = this.y + (this.radius + 4) * Math.sin(endAngle);
          ctx.beginPath();
          ctx.arc(ax, ay, 2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.fill();
        }
        // Speed lines
        const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > 15) {
          const angle = Math.atan2(this.vy, this.vx);
          ctx.strokeStyle = `rgba(255,255,255,${Math.min(0.5, (speed - 15) * 0.05)})`;
          ctx.lineWidth = 1;
          for (let i = 0; i < 3; i++) {
            const offset = (i - 1) * 5;
            const startX = this.x - Math.cos(angle) * (this.radius + 5 + i * 8);
            const startY = this.y - Math.sin(angle) * (this.radius + 5 + i * 8) + offset;
            const endX = startX - Math.cos(angle) * (8 + speed * 0.3);
            const endY = startY - Math.sin(angle) * (8 + speed * 0.3);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
          }
        }
      }
    }

    // --- Setup ---
    const user = new Paddle(50, '#dc3232');
    const ai   = new Paddle(W - 65, '#3264dc');
    const ball = new Ball();
    const powerup = new PowerUp();
    let particles = [];
    let scoreUser = 0, scoreAI = 0;
    let screenShake = { intensity: 0 };
    let hitFlash = { x: 0, y: 0, timer: 0 };

    function spawnParticles(x, y, color, count, bvx, bvy) {
      count = count || 15;
      for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, bvx, bvy));
    }
    function rectCollide(bx, by, br, rx, ry, rw, rh) {
      return bx + br > rx && bx - br < rx + rw && by + br > ry && by - br < ry + rh;
    }

    // --- Menu ---
    let menuButtons = [];
    let menuPulse = 0;

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function handleTap(clientX, clientY) {
      const pos = getCanvasPos(clientX, clientY);
      if (gameState === 'menu') {
        for (const btn of menuButtons) {
          if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
            btn.action();
            break;
          }
        }
      } else if (gameState === 'gameover') {
        showMenu();
      }
    }

    function drawMenu() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);
      // Faint table background
      ctx.fillStyle = 'rgba(25,110,55,0.12)';
      ctx.fillRect(40, 50, W - 80, H - 100);

      menuButtons = [];
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Title
      ctx.font = 'bold 72px Impact, Arial Black, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('TABLE TENNIS', W / 2, 110);

      ctx.font = '22px sans-serif';
      ctx.fillStyle = POWERUP_COLOR;
      ctx.fillText('\u26A1 Power-Up Edition \u{1F525}', W / 2, 155);

      // Difficulty
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('DIFFICULTY', W / 2, 218);

      const diffs = [
        { key: 'easy',   label: 'Easy',   color: '#00e5a0' },
        { key: 'medium', label: 'Medium', color: POWERUP_COLOR },
        { key: 'hard',   label: 'Hard',   color: '#dc3232' },
      ];
      const bw = 160, bh = 52, gap = 20;
      const totalBW = diffs.length * bw + (diffs.length - 1) * gap;
      diffs.forEach((d, i) => {
        const x = W / 2 - totalBW / 2 + i * (bw + gap);
        const y = 234;
        const sel = difficulty === d.key;
        ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.08)';
        roundRect(x, y, bw, bh, 8);
        ctx.fillStyle = sel ? '#000' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}18px sans-serif`;
        ctx.fillText(d.label, x + bw / 2, y + bh / 2);
        menuButtons.push({ x, y, w: bw, h: bh, action: () => { difficulty = d.key; } });
      });

      // Score limit
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('FIRST TO', W / 2, 336);

      const scores = [5, 7, 10];
      const sbw = 120, sbh = 52, sgap = 24;
      const totalSW = scores.length * sbw + (scores.length - 1) * sgap;
      scores.forEach((s, i) => {
        const x = W / 2 - totalSW / 2 + i * (sbw + sgap);
        const y = 352;
        const sel = winScore === s;
        ctx.fillStyle = sel ? '#3264dc' : 'rgba(255,255,255,0.08)';
        roundRect(x, y, sbw, sbh, 8);
        ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.55)';
        ctx.font = `${sel ? 'bold ' : ''}28px Impact, sans-serif`;
        ctx.fillText(s, x + sbw / 2, y + sbh / 2 + 1);
        menuButtons.push({ x, y, w: sbw, h: sbh, action: () => { winScore = s; } });
      });

      // Play button (pulsing)
      const pw = 240, ph = 64;
      const px = W / 2 - pw / 2, py = 458;
      const pulse = 1 + 0.04 * Math.sin(menuPulse * 3);
      ctx.save();
      ctx.translate(W / 2, py + ph / 2);
      ctx.scale(pulse, pulse);
      ctx.translate(-W / 2, -(py + ph / 2));
      ctx.fillStyle = '#00e5a0';
      roundRect(px, py, pw, ph, 12);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 26px Impact, Arial Black, sans-serif';
      ctx.fillText('▶  PLAY', W / 2, py + ph / 2 + 1);
      ctx.restore();
      menuButtons.push({ x: px - 12, y: py - 12, w: pw + 24, h: ph + 24, action: startGame });
    }

    function menuLoop() {
      if (gameState !== 'menu') return;
      menuPulse += 0.03;
      drawMenu();
      requestAnimationFrame(menuLoop);
    }

    // --- Game Loop ---
    function gameLoop() {
      if (gameState !== 'playing') return;

      const aiSpeed    = { easy: 3.5, medium: 6,   hard: 9.5 }[difficulty];
      const aiDeadzone = { easy: 35,  medium: 15,  hard: 4   }[difficulty];
      const aiError    = { easy: 70,  medium: 0,   hard: 0   }[difficulty];

      // User control
      user.centerY = mouseY;
      user.clamp();
      user.updateVelocity();

      // AI — predict ball position with gravity
      ai.updateVelocity();
      let aiTarget;
      if (ball.vx > 0) {
        const framesToReach = Math.min((ai.x - ball.x) / Math.max(ball.vx, 1), 60);
        const predictedY = ball.y + ball.vy * framesToReach;
        aiTarget = predictedY + (aiError ? (Math.random() - 0.5) * aiError : 0);
        const effectiveSpeed = ball.fireball ? aiSpeed * 0.85 : aiSpeed;
        if (ai.centerY < aiTarget - aiDeadzone) ai.y += Math.min(effectiveSpeed, aiTarget - ai.centerY);
        else if (ai.centerY > aiTarget + aiDeadzone) ai.y -= Math.min(effectiveSpeed, ai.centerY - aiTarget);
      } else {
        if (ai.centerY < H / 2) ai.y += 2;
        else if (ai.centerY > H / 2) ai.y -= 2;
      }
      ai.clamp();

      ball.update();
      powerup.update();
      particles.forEach(p => p.update());
      particles = particles.filter(p => p.life > 0 && p.radius > 0);

      // Ball-Paddle collisions (with smash detection)
      // Fireball reduces effective hit zone for the defender
      const userEffH = ball.fireball ? user.h * 0.7 : user.h;
      const userEffY = user.y + (user.h - userEffH) / 2;
      const aiEffH = ball.fireball ? ai.h * 0.7 : ai.h;
      const aiEffY = ai.y + (ai.h - aiEffH) / 2;

      if (rectCollide(ball.x, ball.y, ball.radius, user.x, userEffY, user.w, userEffH) && ball.vx < 0) {
        const hitPower = Math.abs(user.vy);
        const smash = hitPower > 8;
        ball.vx *= smash ? -1.15 : -1.05;
        ball.vy += ((ball.y - user.centerY) / (user.h / 2)) * 6;
        ball.spin = user.vy * 0.6;
        ball.x = user.x + user.w + ball.radius;
        ball.lastHit = 'user';
        const pCount = Math.floor(10 + hitPower * 3);
        spawnParticles(ball.x, ball.y, user.color, pCount, ball.vx, ball.vy);
        if (hitPower > 5) screenShake.intensity = Math.min(hitPower * 0.8, 10);
        hitFlash = { x: ball.x, y: ball.y, timer: 3 };
      }
      if (rectCollide(ball.x, ball.y, ball.radius, ai.x, aiEffY, ai.w, aiEffH) && ball.vx > 0) {
        const hitPower = Math.abs(ai.vy);
        const smash = hitPower > 8;
        ball.vx *= smash ? -1.15 : -1.05;
        ball.vy += ((ball.y - ai.centerY) / (ai.h / 2)) * 6;
        ball.spin = ai.vy * 0.6;
        ball.x = ai.x - ball.radius;
        ball.lastHit = 'ai';
        const pCount = Math.floor(10 + hitPower * 3);
        spawnParticles(ball.x, ball.y, ai.color, pCount, ball.vx, ball.vy);
        if (hitPower > 5) screenShake.intensity = Math.min(hitPower * 0.8, 10);
        hitFlash = { x: ball.x, y: ball.y, timer: 3 };
      }

      // PowerUp collision
      if (powerup.active) {
        const dist = Math.sqrt((ball.x - powerup.x) ** 2 + (ball.y - powerup.y) ** 2);
        if (dist < ball.radius + powerup.radius) {
          powerup.active = false;
          const puColor = powerup.type === 'fireball' ? FIREBALL_COLOR : POWERUP_COLOR;
          spawnParticles(powerup.x, powerup.y, puColor, 20, ball.vx, ball.vy);
          if (powerup.type === 'fireball') {
            ball.activateFireball();
          } else {
            if (ball.lastHit === 'user') user.activatePowerup();
            else if (ball.lastHit === 'ai') ai.activatePowerup();
          }
        }
      }

      // Scoring
      if (ball.x < 0) {
        scoreAI++;
        if (scoreAI >= winScore) { gameState = 'gameover'; winner = 'ai'; canvas.style.cursor = 'default'; }
        else ball.reset();
      }
      if (ball.x > W) {
        scoreUser++;
        if (scoreUser >= winScore) { gameState = 'gameover'; winner = 'user'; canvas.style.cursor = 'default'; }
        else ball.reset();
      }

      // --- Drawing ---
      // Update screen shake
      if (screenShake.intensity > 0) {
        screenShake.intensity *= 0.85;
        if (screenShake.intensity < 0.5) screenShake.intensity = 0;
      }
      if (hitFlash.timer > 0) hitFlash.timer--;

      ctx.save();
      if (screenShake.intensity > 0) {
        const sx = (Math.random() - 0.5) * screenShake.intensity * 2;
        const sy = (Math.random() - 0.5) * screenShake.intensity * 2;
        ctx.translate(sx, sy);
      }

      ctx.fillStyle = BG;
      ctx.fillRect(-10, -10, W + 20, H + 20);

      ctx.fillStyle = TABLE;
      ctx.fillRect(40, 50, W - 80, H - 100);
      ctx.strokeStyle = '#c8c8c8';
      ctx.lineWidth = 4;
      ctx.strokeRect(40, 50, W - 80, H - 100);

      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 50);
      ctx.lineTo(W / 2, H - 50);
      ctx.strokeStyle = 'rgba(200,200,200,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#fff';
      ctx.font = '60px Impact, Arial Black, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`${scoreUser}     ${scoreAI}`, W / 2, 8);
      ctx.globalAlpha = 1;

      ctx.font = '14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'left';
      ctx.fillText('YOU', 52, 32);
      ctx.textAlign = 'right';
      ctx.fillText('AI', W - 52, 32);
      ctx.textAlign = 'center';

      powerup.draw();
      user.draw();
      ai.draw();
      ball.draw();
      particles.forEach(p => p.draw());

      // Hit flash effect
      if (hitFlash.timer > 0) {
        ctx.globalAlpha = hitFlash.timer * 0.25;
        ctx.beginPath();
        ctx.arc(hitFlash.x, hitFlash.y, 20 + (3 - hitFlash.timer) * 10, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Fireball active indicator
      if (ball.fireball) {
        ctx.font = 'bold 13px sans-serif';
        ctx.fillStyle = FIREBALL_COLOR;
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.01) * 0.3;
        ctx.fillText('\u{1F525} FIREBALL', W / 2, H - 30);
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, W, H);

        const isWin = winner === 'user';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.font = 'bold 80px Impact, Arial Black, sans-serif';
        ctx.fillStyle = isWin ? '#00e5a0' : '#ff4444';
        ctx.fillText(isWin ? 'YOU WIN!' : 'YOU LOSE', W / 2, H / 2 - 60);

        ctx.font = '36px Impact, Arial Black, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(`${scoreUser}  —  ${scoreAI}`, W / 2, H / 2 + 10);

        ctx.font = '18px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText('Tap or press Enter to go back to menu', W / 2, H / 2 + 70);
        return;
      }

      requestAnimationFrame(gameLoop);
    }

    // --- State transitions ---
    function startGame() {
      gameState = 'playing';
      canvas.style.cursor = 'none';
      scoreUser = 0; scoreAI = 0;
      winner = null;
      ball.reset();
      particles = [];
      powerup.reset();
      screenShake = { intensity: 0 };
      hitFlash = { x: 0, y: 0, timer: 0 };
      user.h = user.baseHeight; user.powerTimer = 0; user.y = H / 2 - 50;
      ai.h = ai.baseHeight;   ai.powerTimer = 0;   ai.y = H / 2 - 50;
      mouseY = H / 2;
      requestAnimationFrame(gameLoop);
    }

    function showMenu() {
      gameState = 'menu';
      canvas.style.cursor = 'default';
      requestAnimationFrame(menuLoop);
    }

    showMenu();
  </script>
</body>
</html>
